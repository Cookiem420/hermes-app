<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Patrimoine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#06090f;--bg2:#0b0f18;--bg3:#111722;--bg4:#1a2133;
  --border:#1e2a3d;--border2:#2a3a52;
  --text:#e8eef7;--text2:#7a8fa8;--text3:#3d5068;
  --green:#00d68f;--green2:rgba(0,214,143,.1);
  --red:#ff4d6a;--red2:rgba(255,77,106,.1);
  --blue:#4d9fff;--blue2:rgba(77,159,255,.1);
  --gold:#f0b429;--gold2:rgba(240,180,41,.1);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;overflow-y:auto;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.page{padding:24px 32px 60px}

.hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px}
.hdr-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hdr-tot{font-family:var(--mono);font-size:32px;font-weight:700;letter-spacing:-1px}
.hdr-delta{display:flex;align-items:center;gap:8px;margin-top:6px;font-family:var(--mono);font-size:11px}
.hdr-meta{text-align:right;font-family:var(--mono);font-size:9px;color:var(--text3);line-height:2}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text2)}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.kpi-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.kpi-val{font-family:var(--mono);font-size:20px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:3px}
.kpi.g .kpi-val{color:var(--green)}.kpi.b .kpi-val{color:var(--blue)}.kpi.o .kpi-val{color:var(--gold)}

.sec{display:flex;align-items:center;gap:10px;margin-bottom:12px;margin-top:24px}
.sec-t{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.sec-l{flex:1;height:1px;background:var(--border)}

/* TABLEAU */
.env-tbl{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.env-tbl th{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:10px 14px;text-align:right;background:var(--bg3);border-bottom:1px solid var(--border)}
.env-tbl th:first-child{text-align:left}
.env-row{cursor:pointer;transition:background .1s}
.env-row:hover{background:var(--bg3)}
.env-row td{padding:12px 14px;border-top:1px solid var(--border)}
.env-nc{display:flex;align-items:center;gap:9px}
.env-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.env-nom{font-weight:500}
.chev{color:var(--text3);font-size:11px;margin-left:4px;transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(90deg)}
.cr{text-align:right}.cm{font-family:var(--mono)}
.cs{font-size:10px;color:var(--text2);margin-top:2px}
.tot-row td{padding:11px 14px;border-top:2px solid var(--border2);background:var(--bg3);font-family:var(--mono);font-weight:700}

/* DRILL */
.dr-row{display:none}
.dr-row.open{display:table-row}
.dr-wrap{background:var(--bg3);border-top:1px solid var(--border)}
.dr-inner{padding:0 0 4px 32px}
.dr-line{display:flex;align-items:center;padding:7px 14px 7px 0;border-bottom:1px solid var(--border)}
.dr-line:last-child{border-bottom:none}
.dr-name{flex:1}
.dr-nm{font-size:12px}
.dr-sub{font-size:10px;color:var(--text2);margin-top:1px}
.bge{font-family:var(--mono);font-size:8px;padding:2px 5px;border-radius:3px;margin-left:5px;vertical-align:middle}
.b-full{background:var(--blue2);color:var(--blue)}
.b-weak{background:var(--red2);color:var(--red)}
.b-prof{background:var(--gold2);color:var(--gold)}
.dr-val{font-family:var(--mono);font-size:12px;font-weight:600;min-width:90px;text-align:right}
.dr-pnl{font-family:var(--mono);font-size:11px;min-width:90px;text-align:right}
.dr-dlt{font-family:var(--mono);font-size:11px;min-width:80px;text-align:right;color:var(--text3)}
.cash-ln{color:var(--blue);font-family:var(--mono);font-size:11px;font-weight:600}

/* CHARTS */
.ch-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.ch-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px}
.ch-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.ch-empty{text-align:center;padding:44px;font-family:var(--mono);font-size:10px;color:var(--text3)}

/* ANALYSE */
.ana-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ana-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px}
.ana-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.bar-item{margin-bottom:10px}
.bar-hd{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.bar-nm{color:var(--text)}
.bar-nfo{font-family:var(--mono);font-size:10px;color:var(--text2)}
.bar-track{height:4px;background:var(--bg4);border-radius:2px}
.bar-fill{height:100%;border-radius:2px;transition:width .4s}
.leg{display:flex;flex-wrap:wrap;gap:9px;margin-top:11px}
.leg-i{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
.leg-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* VIDE */
.empty-screen{display:flex;align-items:center;justify-content:center;height:75vh;flex-direction:column;gap:14px;text-align:center}
.empty-icon{font-size:44px}
.empty-ttl{font-family:var(--mono);font-size:13px;color:var(--text)}
.empty-sub{font-family:var(--mono);font-size:10px;color:var(--text3);max-width:380px;line-height:1.9}
</style>
</head>
<body>
<div class="page" id="root"><div class="empty-screen"><div class="empty-icon">⏳</div><div class="empty-ttl">Chargement...</div></div></div>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════
const GH_USER  = 'Cookiem420';
const GH_REPO  = 'hermes-data';
const RAW      = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/`;

// Couleurs
const EC = {PEA:'#4d9fff',CTO:'#a78bfa','PEA-PME':'#00d68f',AV:'#f0b429',PEE:'#fb923c',Livrets:'#38bdf8',SCPI:'#e879f9',Revolut:'#34d399'};
const ANA_C = ['#4d9fff','#a78bfa','#00d68f','#f0b429','#fb923c','#38bdf8','#e879f9','#34d399','#ff4d6a'];
const RISQ_C = {Faible:'#00d68f',Modéré:'#f0b429',Élevé:'#fb923c',Spéculatif:'#ff4d6a'};

let DONNEE = null, MAJ_GRAPH = null, TABLE_INFOS = null;
let chartLine = null, chartDonut = null;

// ══════════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════════
function fmt(n,d=0){if(n==null||isNaN(n))return'—';return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)}
function fmtPct(n){if(n==null||isNaN(n))return'—';return(n>0?'+':'')+n.toFixed(2)+'%'}
function pc(v){return v>0.01?'pos':v<-0.01?'neg':'neu'}

// ══════════════════════════════════════════════════════════════════
// CHARGEMENT — noms de fichiers V2 corrects
// maj.json          (était: donnee_maj.json)
// maj_graph.json    (était: historique_maj.json)
// table_infos_valeurs.json (inchangé)
// ══════════════════════════════════════════════════════════════════
async function load() {
  try {
    const [dr, gr, tr] = await Promise.all([
      fetch(RAW+'maj.json?t='+Date.now()),
      fetch(RAW+'maj_graph.json?t='+Date.now()),
      fetch(RAW+'table_infos_valeurs.json?t='+Date.now()),
    ]);
    if(dr.ok) DONNEE     = await dr.json();
    if(gr.ok) MAJ_GRAPH  = await gr.json();
    if(tr.ok) TABLE_INFOS = await tr.json();

    // Debug console pour faciliter le diagnostic
    console.log('[Hermès P1] maj.json ok:', !!DONNEE, '| date_maj:', DONNEE?.meta?.date_maj);
    console.log('[Hermès P1] maj_graph.json ok:', !!MAJ_GRAPH, '| snapshots:', MAJ_GRAPH?.snapshots?.length ?? 'N/A');
    console.log('[Hermès P1] table_infos ok:', !!TABLE_INFOS, '| valeurs:', Object.keys(TABLE_INFOS?.valeurs||{}).length);

    render();
  } catch(e) {
    document.getElementById('root').innerHTML =
      `<div class="empty-screen"><div class="empty-icon">⚠️</div><div class="empty-ttl">Erreur chargement</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ══════════════════════════════════════════════════════════════════
// BUILD ENVELOPPES depuis maj.json
// Structure V2 : totaux.pea/cto/pme/av/pee/livrets/scpi/revolut
//                pea_positions / cto_positions / pme_positions
//                av[] / pee[] / livrets[] (tableaux avec {nom, valeur})
//                scpi (nombre direct) / revolut (nombre direct)
//                cash.pea / cash.cto / cash.pme
// ══════════════════════════════════════════════════════════════════
function buildEnvelopes() {
  if(!DONNEE || !DONNEE.totaux || !DONNEE.meta?.date_maj) return [];

  const T    = DONNEE.totaux;
  const cash = DONNEE.cash || {};

  // MAJ-1 : snapshot précédent depuis maj_graph.json
  const snaps    = MAJ_GRAPH?.snapshots || [];
  const prevSnap = snaps.length >= 2 ? snaps[snaps.length - 2] : null;
  const prevT    = prevSnap?.totaux || {};

  // AV : maj.json a "av" comme tableau [{nom, valeur}]
  const avDetail = Array.isArray(DONNEE.av) ? DONNEE.av : [];
  // PEE : idem
  const peeDetail = Array.isArray(DONNEE.pee) ? DONNEE.pee : [];
  // Livrets : tableau [{nom, valeur}]
  const livretsDetail = Array.isArray(DONNEE.livrets) ? DONNEE.livrets : [];
  // SCPI : nombre direct dans maj.json
  const scpiVal = typeof DONNEE.scpi === 'number' ? DONNEE.scpi : (T.scpi || 0);
  // Revolut : nombre direct
  const revolutVal = typeof DONNEE.revolut === 'number' ? DONNEE.revolut : (T.revolut || 0);

  const defs = [
    {key:'PEA',    nom:'PEA',          tot:T.pea,     prev:prevT.pea||0,     cashVal:cash.pea||0,   positions:DONNEE.pea_positions||[]},
    {key:'CTO',    nom:'CTO',          tot:T.cto,     prev:prevT.cto||0,     cashVal:cash.cto||0,   positions:DONNEE.cto_positions||[]},
    {key:'PEA-PME',nom:'PEA-PME',      tot:T.pme,     prev:prevT.pme||0,     cashVal:cash.pme||0,   positions:DONNEE.pme_positions||[]},
    {key:'AV',     nom:'Ass. Vie',     tot:T.av,      prev:prevT.av||0,      detail:avDetail},
    {key:'PEE',    nom:'PEE',          tot:T.pee,     prev:prevT.pee||0,     detail:peeDetail},
    {key:'Livrets',nom:'Livrets & CC', tot:T.livrets, prev:prevT.livrets||0, detail:livretsDetail},
    {key:'SCPI',   nom:'SCPI',         tot:scpiVal,   prev:prevT.scpi||0,    detail:[{nom:'SCPI Corum Origin', valeur:scpiVal}]},
    {key:'Revolut',nom:'Revolut',      tot:revolutVal,prev:prevT.revolut||0, detail:[{nom:'Revolut ETF Trading', valeur:revolutVal}]},
  ].filter(e => (e.tot||0) > 0);

  return defs.map(e => {
    const lines = [];
    const isCote = ['PEA','CTO','PEA-PME'].includes(e.key);

    if(isCote) {
      if(e.cashVal > 0) lines.push({type:'cash', nom:'Espèces', val:e.cashVal});
      (e.positions||[]).forEach(p => {
        const cost   = (p.pru||0) * (p.quantite||0);
        const pnlEur = (p.montant||0) - cost;
        const pnlPct = cost > 0 ? pnlEur / cost * 100 : null;
        lines.push({type:'pos', nom:p.nom, isin:p.isin,
          val:p.montant||0, pnlEur, pnlPct, quantite:p.quantite, pru:p.pru});
      });
    } else {
      (e.detail||[]).forEach(d => lines.push({type:'detail', nom:d.nom, val:d.valeur||0}));
    }

    return {...e, color:EC[e.key]||'#888', lines};
  });
}

// ══════════════════════════════════════════════════════════════════
// ANALYSE Risque/Thème/Catégorie depuis table_infos_valeurs.json
// ══════════════════════════════════════════════════════════════════
function buildAnalysis() {
  const infos = TABLE_INFOS?.valeurs || {};
  const risque = {}, themes = {}, cats = {};

  const allPos = [
    ...(DONNEE?.pea_positions||[]),
    ...(DONNEE?.cto_positions||[]),
    ...(DONNEE?.pme_positions||[]),
  ];

  const base = allPos.reduce((s,p) => s + (p.montant||0), 0) || 1;

  allPos.forEach(p => {
    const val = p.montant || 0;
    if(!val) return;

    const isinKey = (p.isin||'').trim().replace(/\s/g,'').toUpperCase();
    const info = isinKey ? infos[isinKey] : null;

    const ris   = info?.risque     || null;
    const theme = info?.thematique || null;
    const cat   = info?.categorie  || null;

    if(ris)   risque[ris]   = (risque[ris]||0)   + val;
    if(theme) themes[theme] = (themes[theme]||0) + val;
    if(cat)   cats[cat]     = (cats[cat]||0)     + val;
  });

  return {risque, themes, cats, base};
}

// ══════════════════════════════════════════════════════════════════
// RENDER TABLEAU
// ══════════════════════════════════════════════════════════════════
function renderTableau(envs, total) {
  const snaps   = MAJ_GRAPH?.snapshots || [];
  const prevTot = snaps.length >= 2 ? (snaps[snaps.length-2].totaux?.total || total) : total;
  const totDlt  = total - prevTot;
  const totDltP = prevTot > 0 ? totDlt / prevTot * 100 : 0;

  let rows = '';
  envs.forEach((env, i) => {
    const delta    = env.tot - env.prev;
    const deltaPct = env.prev > 0 ? delta / env.prev * 100 : 0;
    const pct      = total > 0 ? env.tot / total * 100 : 0;

    let pnlSum = null, costSum = 0;
    (env.lines||[]).forEach(l => {
      if(l.type==='pos'){pnlSum=(pnlSum||0)+(l.pnlEur||0);costSum+=(l.val||0)-(l.pnlEur||0);}
    });
    const pnlPctG = costSum > 0 && pnlSum != null ? pnlSum / costSum * 100 : null;

    rows += `
      <tr class="env-row" onclick="drillToggle(${i})">
        <td><div class="env-nc">
          <div class="env-dot" style="background:${env.color}"></div>
          <span class="env-nom">${env.nom}</span>
          <span class="chev" id="chv-${i}">›</span>
        </div></td>
        <td class="cr"><div class="cm" style="font-weight:600">${fmt(env.tot)} €</div>
          <div class="cs">${pct.toFixed(1)}% patrim.</div></td>
        <td class="cr">
          ${pnlPctG!=null
            ?`<div class="cm ${pc(pnlPctG)}">${fmtPct(pnlPctG)}</div><div class="cs ${pc(pnlSum)}">${fmt(pnlSum)} €</div>`
            :'<div class="neu">—</div>'}
        </td>
        <td class="cr">
          ${delta !== 0
            ?`<div class="cm ${pc(delta)}">${delta>0?'+':''}${fmt(delta)} €</div><div class="cs ${pc(deltaPct)}">${fmtPct(deltaPct)}</div>`
            :'<div class="neu">—</div>'}
        </td>
      </tr>
      <tr class="dr-row" id="dr-${i}">
        <td colspan="4" style="padding:0">${renderDrill(env)}</td>
      </tr>`;
  });

  rows += `<tr class="tot-row">
    <td>TOTAL</td>
    <td class="cr" style="font-size:15px">${fmt(total)} €</td>
    <td class="cr neu">—</td>
    <td class="cr ${pc(totDlt)}">${totDlt!==0?(totDlt>0?'+':'')+fmt(totDlt)+' €':''}</td>
  </tr>`;

  return `<table class="env-tbl">
    <thead><tr>
      <th style="width:30%">Enveloppe</th>
      <th style="width:22%;text-align:right">Montant</th>
      <th style="width:22%;text-align:right">P&L historique</th>
      <th style="width:26%;text-align:right">Δ MAJ précédente</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderDrill(env) {
  if(!env.lines || env.lines.length === 0)
    return `<div class="dr-wrap"><div class="dr-inner" style="padding:12px 14px;font-family:var(--mono);font-size:10px;color:var(--text3)">Aucune position</div></div>`;

  let h = '<div class="dr-wrap"><div class="dr-inner">';
  env.lines.forEach(l => {
    if(l.type === 'cash') {
      h += `<div class="dr-line"><div class="dr-name"><span class="cash-ln">💵 ${l.nom}</span></div>
        <div class="dr-val" style="color:var(--blue)">${fmt(l.val,2)} €</div>
        <div class="dr-pnl">—</div><div class="dr-dlt">—</div></div>`;
    } else if(l.type === 'pos') {
      h += `<div class="dr-line">
        <div class="dr-name">
          <div class="dr-nm">${l.nom}${l.isin?`<span style="color:var(--text3);font-family:var(--mono);font-size:9px;margin-left:6px">${l.isin}</span>`:''}</div>
          <div class="dr-sub">${l.quantite} titres · PRU ${fmt(l.pru,2)} €</div>
        </div>
        <div class="dr-val">${fmt(l.val)} €</div>
        <div class="dr-pnl ${pc(l.pnlEur)}">
          ${l.pnlEur!=null?(l.pnlEur>=0?'+':'')+fmt(l.pnlEur)+' €':'—'}
          ${l.pnlPct!=null?`<div style="font-size:10px">${fmtPct(l.pnlPct)}</div>`:''}
        </div>
        <div class="dr-dlt">—</div>
      </div>`;
    } else {
      h += `<div class="dr-line"><div class="dr-name"><div class="dr-nm">${l.nom}</div></div>
        <div class="dr-val">${fmt(l.val,2)} €</div><div class="dr-pnl">—</div><div class="dr-dlt">—</div></div>`;
    }
  });
  h += '</div></div>';
  return h;
}

function drillToggle(i) {
  const dr   = document.getElementById('dr-'+i);
  const chev = document.getElementById('chv-'+i);
  if(!dr) return;
  const was = dr.classList.contains('open');
  document.querySelectorAll('.dr-row').forEach(r => r.classList.remove('open'));
  document.querySelectorAll('.chev').forEach(c => c.classList.remove('open'));
  if(!was){dr.classList.add('open');chev?.classList.add('open');}
}

// ══════════════════════════════════════════════════════════════════
// CHARTS
// ══════════════════════════════════════════════════════════════════
function initChartLine() {
  const snaps = MAJ_GRAPH?.snapshots || [];
  if(snaps.length < 2) return;
  const canvas = document.getElementById('ch-line');
  if(!canvas) return;
  if(chartLine) chartLine.destroy();

  const labels = snaps.map(s => new Date(s.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}));
  const keys = [{k:'pea',l:'PEA'},{k:'cto',l:'CTO'},{k:'pme',l:'PEA-PME'},{k:'av',l:'AV'},
    {k:'pee',l:'PEE'},{k:'livrets',l:'Livrets'},{k:'scpi',l:'SCPI'},{k:'revolut',l:'Revolut'}]
    .filter(d => snaps.some(s => (s.totaux?.[d.k]||0) > 0));

  chartLine = new Chart(canvas, {
    type:'line',
    data:{labels, datasets:keys.map(d => ({
      label:d.l, data:snaps.map(s => s.totaux?.[d.k]||0),
      borderColor:EC[d.l]||EC[d.k]||'#4d9fff',
      backgroundColor:(EC[d.l]||'#4d9fff')+'15',
      fill:true, tension:.3, pointRadius:snaps.length>10?2:4, borderWidth:2,
    }))},
    options:{
      responsive:true, interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#7a8fa8',font:{family:"'IBM Plex Mono'",size:10},boxWidth:10}},
        tooltip:{backgroundColor:'#111722',borderColor:'#1e2a3d',borderWidth:1,
          callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.raw)} €`}}
      },
      scales:{
        x:{grid:{color:'#1e2a3d'},ticks:{color:'#3d5068',font:{family:"'IBM Plex Mono'",size:9}}},
        y:{grid:{color:'#1e2a3d'},ticks:{color:'#3d5068',font:{family:"'IBM Plex Mono'",size:9},callback:v=>fmt(v)+'€'}},
      }
    }
  });
}

function initChartDonut(envs, total) {
  const canvas = document.getElementById('ch-donut');
  if(!canvas) return;
  if(chartDonut) chartDonut.destroy();
  chartDonut = new Chart(canvas, {
    type:'doughnut',
    data:{labels:envs.map(e=>e.nom), datasets:[{data:envs.map(e=>e.tot), backgroundColor:envs.map(e=>e.color), borderWidth:0, hoverOffset:4}]},
    options:{cutout:'68%', plugins:{
      legend:{display:false},
      tooltip:{backgroundColor:'#111722',borderColor:'#1e2a3d',borderWidth:1,
        callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.raw)} € (${(ctx.raw/total*100).toFixed(1)}%)`}}
    }}
  });
  const leg = document.getElementById('donut-leg');
  if(leg) leg.innerHTML = envs.map(e => `
    <div class="leg-i"><div class="leg-d" style="background:${e.color}"></div>
    <span>${e.nom} ${(e.tot/total*100).toFixed(0)}%</span></div>`).join('');
}

function renderBars(data, base, colorMap) {
  const items = Object.entries(data).sort((a,b) => b[1]-a[1]);
  const covered = Object.values(data).reduce((s,v) => s+v, 0);
  const pctCovered = base > 0 ? covered/base*100 : 0;
  const nonClass = base - covered;

  if(!items.length) return `<div style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:6px 0">
    Aucune donnée — renseignez les métadonnées dans Produit 2 → Actions → Infos manquantes</div>`;

  let html = items.map(([lbl,val],i) => {
    const pct = base > 0 ? val/base*100 : 0;
    const col = colorMap?.[lbl] || ANA_C[i % ANA_C.length];
    return `<div class="bar-item">
      <div class="bar-hd">
        <span class="bar-nm" style="color:${col}">${lbl}</span>
        <span class="bar-nfo">${fmt(val)} € · ${pct.toFixed(1)}%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>
    </div>`;
  }).join('');

  if(nonClass > 50 && pctCovered < 99) {
    html += `<div style="margin-top:10px;font-family:var(--mono);font-size:9px;color:var(--text3);border-top:1px solid var(--border);padding-top:8px">
      ⚠ ${(100-pctCovered).toFixed(0)}% non classifié (${fmt(nonClass)} €) — à renseigner dans Actions
    </div>`;
  }
  return html;
}

// ══════════════════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ══════════════════════════════════════════════════════════════════
function render() {
  const hasDonnee = DONNEE && DONNEE.meta?.date_maj;
  if(!hasDonnee) {
    document.getElementById('root').innerHTML = `
      <div class="empty-screen">
        <div class="empty-icon">◈</div>
        <div class="empty-ttl">Tableau de bord vide</div>
        <div class="empty-sub">
          Faites une première <strong style="color:var(--gold)">Mise à jour</strong> dans l'onglet ↑<br>
          pour initialiser votre patrimoine.<br><br>
          Importez vos CSV Boursorama et saisissez vos valeurs manuelles.
        </div>
      </div>`;
    return;
  }

  const envs    = buildEnvelopes();
  const T       = DONNEE.totaux;
  const snaps   = MAJ_GRAPH?.snapshots || [];
  const prevSnap= snaps.length >= 2 ? snaps[snaps.length-2] : null;
  const prevTot = prevSnap?.totaux?.total || T.total;
  const delta   = T.total - prevTot;
  const deltaPct= prevTot > 0 ? delta/prevTot*100 : 0;
  const cashTot = (DONNEE.cash?.pea||0)+(DONNEE.cash?.cto||0)+(DONNEE.cash?.pme||0);
  const invCote = (T.pea||0)+(T.cto||0)+(T.pme||0);
  const garanti = (T.av||0)+(T.pee||0)+(T.livrets||0)+(T.scpi||0);
  const majDate = DONNEE.meta.date_maj;
  const nSnaps  = snaps.length;

  const {risque, themes, cats, base} = buildAnalysis();

  document.getElementById('root').innerHTML = `
    <div class="hdr">
      <div>
        <div class="hdr-lbl">Patrimoine total</div>
        <div class="hdr-tot ${pc(delta)}">${fmt(T.total)} €</div>
        <div class="hdr-delta">
          <span class="${pc(delta)}">${delta>=0?'+':''}${fmt(delta)} €</span>
          <span class="${pc(deltaPct)}" style="font-size:10px">${fmtPct(deltaPct)}</span>
          <span style="color:var(--text3);font-size:10px">vs MAJ préc.</span>
        </div>
      </div>
      <div class="hdr-meta">
        <div>Dernière MAJ : <span style="color:var(--text)">${majDate}</span></div>
        <div>${envs.length} enveloppes · ${nSnaps} point(s) historique</div>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi g"><div class="kpi-lbl">Investi coté</div>
        <div class="kpi-val">${fmt(invCote)} €</div><div class="kpi-sub">PEA · CTO · PME</div></div>
      <div class="kpi o"><div class="kpi-lbl">Garanti & non coté</div>
        <div class="kpi-val">${fmt(garanti)} €</div><div class="kpi-sub">AV · PEE · Livrets · SCPI</div></div>
      <div class="kpi b"><div class="kpi-lbl">Cash disponible</div>
        <div class="kpi-val">${fmt(cashTot)} €</div><div class="kpi-sub">Espèces PEA+CTO+PME</div></div>
      <div class="kpi"><div class="kpi-lbl">Total</div>
        <div class="kpi-val">${fmt(T.total)} €</div>
        <div class="kpi-sub ${pc(delta)}">${delta>=0?'+':''}${fmt(delta)} € vs MAJ préc.</div></div>
    </div>

    <div class="sec"><div class="sec-t">Niveau 1 — Enveloppes</div><div class="sec-l"></div></div>
    ${renderTableau(envs, T.total)}

    <div class="sec"><div class="sec-t">Niveau 2 — Évolution</div><div class="sec-l"></div></div>
    <div class="ch-grid">
      <div class="ch-card"><div class="ch-lbl">Patrimoine par enveloppe</div>
        ${nSnaps>=2?'<canvas id="ch-line"></canvas>':`<div class="ch-empty">Il faut au moins 2 MAJ pour afficher la courbe (${nSnaps}/2)</div>`}
      </div>
      <div class="ch-card"><div class="ch-lbl">Répartition</div>
        <canvas id="ch-donut" style="max-height:180px"></canvas>
        <div class="leg" id="donut-leg"></div>
      </div>
    </div>

    <div class="sec"><div class="sec-t">Niveaux 3/4/5 — Risque · Thématique · Catégorie</div><div class="sec-l"></div></div>
    <div class="ana-grid">
      <div class="ana-card"><div class="ana-lbl">Niveau 3 — Risque</div>${renderBars(risque,base,RISQ_C)}</div>
      <div class="ana-card"><div class="ana-lbl">Niveau 4 — Thématiques</div>${renderBars(themes,base,null)}</div>
      <div class="ana-card"><div class="ana-lbl">Niveau 5 — Catégories</div>${renderBars(cats,base,null)}</div>
    </div>
  `;

  initChartLine();
  initChartDonut(envs, T.total);
}

load();
</script>
</body>
</html>
