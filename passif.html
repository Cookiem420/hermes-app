<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Patrimoine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#06090f;--bg2:#0b0f18;--bg3:#111722;--bg4:#1a2133;
  --border:#1e2a3d;--border2:#2a3a52;
  --text:#e8eef7;--text2:#7a8fa8;--text3:#3d5068;
  --green:#00d68f;--green2:rgba(0,214,143,.1);
  --red:#ff4d6a;--red2:rgba(255,77,106,.1);
  --blue:#4d9fff;--blue2:rgba(77,159,255,.1);
  --gold:#f0b429;--gold2:rgba(240,180,41,.1);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;overflow-y:auto;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.page{padding:24px 32px 60px}
.hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px}
.hdr-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hdr-tot{font-family:var(--mono);font-size:32px;font-weight:700;letter-spacing:-1px}
.hdr-delta{display:flex;align-items:center;gap:8px;margin-top:6px;font-family:var(--mono);font-size:11px}
.hdr-meta{text-align:right;font-family:var(--mono);font-size:9px;color:var(--text3);line-height:2}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text2)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.kpi-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.kpi-val{font-family:var(--mono);font-size:20px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:3px}
.kpi.g .kpi-val{color:var(--green)}.kpi.b .kpi-val{color:var(--blue)}.kpi.o .kpi-val{color:var(--gold)}
.sec{display:flex;align-items:center;gap:10px;margin-bottom:12px;margin-top:24px}
.sec-t{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.sec-l{flex:1;height:1px;background:var(--border)}
.env-tbl{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.env-tbl th{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:10px 14px;text-align:right;background:var(--bg3);border-bottom:1px solid var(--border)}
.env-tbl th:first-child{text-align:left}
.env-row{cursor:pointer;transition:background .1s}
.env-row:hover{background:var(--bg3)}
.env-row td{padding:12px 14px;border-top:1px solid var(--border)}
.env-nc{display:flex;align-items:center;gap:9px}
.env-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.env-nom{font-weight:500}
.chev{color:var(--text3);font-size:11px;margin-left:4px;transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(90deg)}
.cr{text-align:right}.cm{font-family:var(--mono)}
.cs{font-size:10px;color:var(--text2);margin-top:2px}
.tot-row td{padding:11px 14px;border-top:2px solid var(--border2);background:var(--bg3);font-family:var(--mono);font-weight:700}
.dr-row{display:none}
.dr-row.open{display:table-row}
.dr-wrap{background:var(--bg3);border-top:1px solid var(--border)}
.dr-inner{padding:0 0 4px 32px}
.dr-line{display:flex;align-items:center;padding:7px 14px 7px 0;border-bottom:1px solid var(--border)}
.dr-line:last-child{border-bottom:none}
.dr-name{flex:1}
.dr-nm{font-size:12px}
.dr-sub{font-size:10px;color:var(--text2);margin-top:1px}
.dr-val{font-family:var(--mono);font-size:12px;font-weight:600;min-width:100px;text-align:right}
.dr-pnl{font-family:var(--mono);font-size:11px;min-width:100px;text-align:right}
.dr-dlt{font-family:var(--mono);font-size:11px;min-width:90px;text-align:right}
.cash-ln{color:var(--blue);font-family:var(--mono);font-size:11px;font-weight:600}
.badge-new{font-family:var(--mono);font-size:8px;padding:2px 5px;border-radius:3px;background:var(--blue2);color:var(--blue);margin-left:5px;vertical-align:middle}
.ch-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.ch-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px}
.ch-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.ch-empty{text-align:center;padding:44px;font-family:var(--mono);font-size:10px;color:var(--text3)}
.ana-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ana-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px}
.ana-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.bar-item{margin-bottom:10px}
.bar-hd{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.bar-nm{color:var(--text)}
.bar-nfo{font-family:var(--mono);font-size:10px;color:var(--text2)}
.bar-track{height:4px;background:var(--bg4);border-radius:2px}
.bar-fill{height:100%;border-radius:2px;transition:width .4s}
.leg{display:flex;flex-wrap:wrap;gap:9px;margin-top:11px}
.leg-i{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
.leg-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* PANEL DETAIL POSITION */
.pos-panel{display:none;position:fixed;top:0;right:0;width:420px;height:100vh;
  background:var(--bg2);border-left:1px solid var(--border2);z-index:200;
  overflow-y:auto;box-shadow:-8px 0 32px rgba(0,0,0,.5)}
.pos-panel.open{display:flex;flex-direction:column}
.pp-hdr{padding:20px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.pp-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;line-height:1}
.pp-close:hover{color:var(--text)}
.pp-nom{font-weight:600;font-size:14px;margin-bottom:3px}
.pp-isin{font-family:var(--mono);font-size:9px;color:var(--text3)}
.pp-body{padding:16px 20px;flex:1}
.pp-sec{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px}
.pp-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.pp-row:last-child{border-bottom:none}
.pp-key{font-family:var(--mono);font-size:10px;color:var(--text2)}
.pp-val{font-family:var(--mono);font-size:11px;font-weight:600}
.pp-fi{background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:5px 9px;
  color:var(--text);font-family:var(--mono);font-size:11px;outline:none;width:100%}
.pp-fi:focus{border-color:var(--blue)}
.pp-select{appearance:none}
.pp-fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.pp-fl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.pp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pp-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pp-btn-save{background:var(--green);color:var(--bg);border:none;border-radius:5px;
  padding:9px 18px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;width:100%;margin-top:12px}
.pp-btn-save:hover{opacity:.9}
.pp-toast{font-family:var(--mono);font-size:10px;text-align:center;padding:6px;border-radius:4px;margin-top:8px;display:none}
.pp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.pp-overlay.open{display:block}
.dr-line.clickable-pos{cursor:pointer}
.dr-line.clickable-pos:hover .dr-nm{color:var(--blue)}

.empty-screen{display:flex;align-items:center;justify-content:center;height:75vh;flex-direction:column;gap:14px;text-align:center}
.empty-icon{font-size:44px}
.empty-ttl{font-family:var(--mono);font-size:13px;color:var(--text)}
.empty-sub{font-family:var(--mono);font-size:10px;color:var(--text3);max-width:380px;line-height:1.9}
</style>
</head>
<body>

<div class="pp-overlay" id="pp-overlay" onclick="closePanel()"></div>
<div class="pos-panel" id="pos-panel">
  <div class="pp-hdr">
    <div><div class="pp-nom" id="pp-nom">—</div><div class="pp-isin" id="pp-isin">—</div></div>
    <button class="pp-close" onclick="closePanel()">✕</button>
  </div>
  <div class="pp-body" id="pp-body"></div>
</div>
<div class="page" id="root"><div class="empty-screen"><div class="empty-icon">⏳</div><div class="empty-ttl">Chargement...</div></div></div>
<script>
const GH_USER = 'Cookiem420';
const GH_REPO = 'hermes-data';
const RAW = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/`;
const EC = {PEA:'#4d9fff',CTO:'#a78bfa','PEA-PME':'#00d68f',AV:'#f0b429',PEE:'#fb923c',Livrets:'#38bdf8',SCPI:'#e879f9',Revolut:'#34d399'};
const ANA_C = ['#4d9fff','#a78bfa','#00d68f','#f0b429','#fb923c','#38bdf8','#e879f9','#34d399','#ff4d6a'];
const RISQ_C = {Faible:'#00d68f',Modéré:'#f0b429',Élevé:'#fb923c',Spéculatif:'#ff4d6a'};

let MAJ=null, MAJ1=null, MAJ_GRAPH=null, TABLE_INFOS=null;
let chartLine=null, chartDonut=null;

function fmt(n,d=0){if(n==null||isNaN(n))return'—';return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)}
function fmtPct(n){if(n==null||isNaN(n))return'—';return(n>0?'+':'')+n.toFixed(2)+'%'}
function pc(v){return v>0.01?'pos':v<-0.01?'neg':'neu'}
function dltHtml(delta, pct, isNew=false) {
  if(isNew) return `<div class="badge-new">NOUVEAU</div>`;
  if(delta==null) return `<div class="neu">—</div>`;
  return `<div class="${pc(delta)}">${delta>=0?'+':''}${fmt(delta)} €</div>
          <div class="cs ${pc(pct)}">${fmtPct(pct)}</div>`;
}

// ══════════════════════════════════════════════════════════════════
// CHARGEMENT — 4 fichiers MAJ + table_infos
// ══════════════════════════════════════════════════════════════════
async function load() {
  try {
    const t = Date.now();
    const [r1,r2,r3,r4] = await Promise.all([
      fetch(RAW+'maj.json?t='+t),
      fetch(RAW+'maj_moins1.json?t='+t),
      fetch(RAW+'maj_graph.json?t='+t),
      fetch(RAW+'table_infos_valeurs.json?t='+t),
    ]);
    if(r1.ok) MAJ        = await r1.json();
    if(r2.ok) MAJ1       = await r2.json();
    if(r3.ok) MAJ_GRAPH  = await r3.json();
    if(r4.ok) TABLE_INFOS= await r4.json();

    console.log('[P1] maj ok:', !!MAJ, MAJ?.meta?.date_maj);
    console.log('[P1] maj_moins1 ok:', !!MAJ1, MAJ1?.meta?.date_maj);
    console.log('[P1] maj_graph ok:', !!MAJ_GRAPH, MAJ_GRAPH?.snapshots?.length,'snaps');
    console.log('[P1] table_infos ok:', !!TABLE_INFOS, Object.keys(TABLE_INFOS?.valeurs||{}).length,'valeurs');

    render();
  } catch(e) {
    document.getElementById('root').innerHTML =
      `<div class="empty-screen"><div class="empty-icon">⚠️</div><div class="empty-ttl">Erreur chargement</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ══════════════════════════════════════════════════════════════════
// BUILD ENVELOPPES
// Delta niveau enveloppe  : maj.totaux[key] - maj_moins1.totaux[key]
// Delta niveau position   : match par ISIN (cotées) ou nom (AV/PEE/livrets)
// ══════════════════════════════════════════════════════════════════
function buildEnvelopes() {
  if(!MAJ?.totaux || !MAJ?.meta?.date_maj) return [];
  const T  = MAJ.totaux;
  const T1 = MAJ1?.totaux || {};
  const cash = MAJ.cash || {};

  // Index maj_moins1 positions par ISIN pour lookup rapide
  function indexByIsin(arr) {
    const m = {};
    (arr||[]).forEach(p => { if(p.isin) m[p.isin.trim().toUpperCase()] = p; });
    return m;
  }
  // Index par nom pour AV/PEE/livrets
  function indexByNom(arr) {
    const m = {};
    (arr||[]).forEach(p => { if(p.nom) m[p.nom.trim()] = p; });
    return m;
  }

  const prev_pea  = indexByIsin(MAJ1?.pea_positions);
  const prev_cto  = indexByIsin(MAJ1?.cto_positions);
  const prev_pme  = indexByIsin(MAJ1?.pme_positions);
  const prev_av   = indexByNom(MAJ1?.av);
  const prev_pee  = indexByNom(MAJ1?.pee);
  const prev_liv  = indexByNom(MAJ1?.livrets);

  // Construire les lignes drill-down pour une enveloppe cotée
  function buildCoteLines(positions, prevIdx, cashVal) {
    const lines = [];
    if(cashVal > 0) {
      const prevCash = MAJ1?.cash?.[cashVal === cash.pea ? 'pea' : cashVal === cash.cto ? 'cto' : 'pme'] || 0;
      const dCash = prevCash > 0 ? cashVal - prevCash : null;
      lines.push({type:'cash', nom:'Espèces', val:cashVal, delta:dCash, deltaPct: prevCash>0?dCash/prevCash*100:null, isNew:false});
    }
    positions.forEach(p => {
      const cost   = (p.pru||0) * (p.quantite||0);
      const pnlEur = (p.montant||0) - cost;
      const pnlPct = cost > 0 ? pnlEur/cost*100 : null;
      const isinKey = (p.isin||'').trim().toUpperCase();
      const prev   = prevIdx[isinKey];
      const isNew  = !prev;
      const delta  = prev ? (p.montant||0) - (prev.montant||0) : null;
      const deltaPct = prev && prev.montant > 0 ? delta/prev.montant*100 : null;
      lines.push({type:'pos', nom:p.nom, isin:p.isin,
        val:p.montant||0, pnlEur, pnlPct, quantite:p.quantite, pru:p.pru,
        delta, deltaPct, isNew});
    });
    return lines;
  }

  // Construire les lignes drill-down pour AV/PEE/livrets
  function buildDetailLines(arr, prevIdx) {
    const lines = [];
    // Lignes présentes dans MAJ courant
    const seen = new Set();
    (arr||[]).forEach(d => {
      seen.add(d.nom?.trim());
      const prev = prevIdx[d.nom?.trim()];
      const isNew = !prev;
      const delta  = prev ? (d.valeur||0) - (prev.valeur||0) : null;
      const deltaPct = prev && prev.valeur > 0 ? delta/prev.valeur*100 : null;
      lines.push({type:'detail', nom:d.nom, val:d.valeur||0, delta, deltaPct, isNew});
    });
    // Lignes présentes dans MAJ-1 mais absentes de MAJ (position clôturée)
    Object.values(prevIdx).forEach(p => {
      if(!seen.has(p.nom?.trim())) {
        lines.push({type:'detail', nom:p.nom, val:0, delta:-(p.valeur||0),
          deltaPct:-100, isNew:false, closed:true});
      }
    });
    return lines;
  }

  const cashKeys = {PEA:'pea', CTO:'cto', 'PEA-PME':'pme'};

  const defs = [
    {key:'PEA',    nom:'PEA',          tot:T.pea,     prev:T1.pea||0,
      lines: buildCoteLines(MAJ.pea_positions||[], prev_pea, cash.pea||0)},
    {key:'CTO',    nom:'CTO',          tot:T.cto,     prev:T1.cto||0,
      lines: buildCoteLines(MAJ.cto_positions||[], prev_cto, cash.cto||0)},
    {key:'PEA-PME',nom:'PEA-PME',      tot:T.pme,     prev:T1.pme||0,
      lines: buildCoteLines(MAJ.pme_positions||[], prev_pme, cash.pme||0)},
    {key:'AV',     nom:'Ass. Vie',     tot:T.av,      prev:T1.av||0,
      lines: buildDetailLines(MAJ.av||[], prev_av)},
    {key:'PEE',    nom:'PEE',          tot:T.pee,     prev:T1.pee||0,
      lines: buildDetailLines(MAJ.pee||[], prev_pee)},
    {key:'Livrets',nom:'Livrets & CC', tot:T.livrets, prev:T1.livrets||0,
      lines: buildDetailLines(MAJ.livrets||[], prev_liv)},
    {key:'SCPI',   nom:'SCPI',         tot:T.scpi||0, prev:T1.scpi||0,
      lines:[{type:'detail',nom:'SCPI Corum Origin',val:T.scpi||0,
        delta:T1.scpi?(T.scpi-T1.scpi):null, deltaPct:T1.scpi?(T.scpi-T1.scpi)/T1.scpi*100:null, isNew:false}]},
    {key:'Revolut',nom:'Revolut',      tot:T.revolut||0, prev:T1.revolut||0,
      lines:[{type:'detail',nom:'Revolut ETF Trading',val:T.revolut||0,
        delta:T1.revolut?(T.revolut-T1.revolut):null, deltaPct:T1.revolut?(T.revolut-T1.revolut)/T1.revolut*100:null, isNew:false}]},
  ].filter(e => (e.tot||0) > 0);

  return defs.map(e => ({...e, color:EC[e.key]||'#888'}));
}

// ══════════════════════════════════════════════════════════════════
// ANALYSE N3/4/5 depuis table_infos_valeurs.json
// ══════════════════════════════════════════════════════════════════
function buildAnalysis() {
  const infos = TABLE_INFOS?.valeurs || {};
  const risque={}, themes={}, cats={};
  const allPos = [...(MAJ?.pea_positions||[]), ...(MAJ?.cto_positions||[]), ...(MAJ?.pme_positions||[])];
  const base = allPos.reduce((s,p)=>s+(p.montant||0),0)||1;

  allPos.forEach(p => {
    const val = p.montant||0;
    if(!val) return;
    const key = (p.isin||'').trim().replace(/\s/g,'').toUpperCase();
    const info = infos[key];
    if(info?.risque)     risque[info.risque]     = (risque[info.risque]||0)+val;
    if(info?.thematique) themes[info.thematique] = (themes[info.thematique]||0)+val;
    if(info?.categorie)  cats[info.categorie]    = (cats[info.categorie]||0)+val;
  });
  return {risque, themes, cats, base};
}

// ══════════════════════════════════════════════════════════════════
// RENDER TABLEAU
// ══════════════════════════════════════════════════════════════════
function renderTableau(envs, total) {
  const prevTotal = MAJ1?.totaux?.total || total;
  const totDlt  = total - prevTotal;
  const totDltP = prevTotal>0 ? totDlt/prevTotal*100 : 0;

  let rows = '';
  envs.forEach((env, i) => {
    const delta    = MAJ1 ? env.tot - env.prev : null;
    const deltaPct = env.prev>0 && delta!=null ? delta/env.prev*100 : null;
    const pct      = total>0 ? env.tot/total*100 : 0;

    // P&L global cotées
    let pnlSum=null, costSum=0;
    (env.lines||[]).forEach(l=>{
      if(l.type==='pos'){pnlSum=(pnlSum||0)+(l.pnlEur||0);costSum+=(l.val||0)-(l.pnlEur||0);}
    });
    const pnlPctG = costSum>0&&pnlSum!=null ? pnlSum/costSum*100 : null;

    rows += `
      <tr class="env-row" onclick="drillToggle(${i})">
        <td><div class="env-nc">
          <div class="env-dot" style="background:${env.color}"></div>
          <span class="env-nom">${env.nom}</span>
          <span class="chev" id="chv-${i}">›</span>
        </div></td>
        <td class="cr"><div class="cm" style="font-weight:600">${fmt(env.tot)} €</div>
          <div class="cs">${pct.toFixed(1)}% patrim.</div></td>
        <td class="cr">
          ${pnlPctG!=null
            ?`<div class="cm ${pc(pnlPctG)}">${fmtPct(pnlPctG)}</div><div class="cs ${pc(pnlSum)}">${fmt(pnlSum)} €</div>`
            :'<div class="neu">—</div>'}
        </td>
        <td class="cr">${dltHtml(delta, deltaPct)}</td>
      </tr>
      <tr class="dr-row" id="dr-${i}">
        <td colspan="4" style="padding:0">${renderDrill(env)}</td>
      </tr>`;
  });

  rows += `<tr class="tot-row">
    <td>TOTAL</td>
    <td class="cr" style="font-size:15px">${fmt(total)} €</td>
    <td class="cr neu">—</td>
    <td class="cr">${dltHtml(totDlt, totDltP)}</td>
  </tr>`;

  return `<table class="env-tbl">
    <thead><tr>
      <th style="width:30%">Enveloppe</th>
      <th style="width:22%;text-align:right">Montant</th>
      <th style="width:22%;text-align:right">P&L historique</th>
      <th style="width:26%;text-align:right">Δ MAJ précédente</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderDrill(env) {
  if(!env.lines||env.lines.length===0)
    return `<div class="dr-wrap"><div class="dr-inner" style="padding:12px 14px;font-family:var(--mono);font-size:10px;color:var(--text3)">Aucune position</div></div>`;

  let h = '<div class="dr-wrap"><div class="dr-inner">';
  env.lines.forEach(l => {
    const closedStyle = l.closed ? 'opacity:0.45;' : '';
    if(l.type==='cash') {
      h += `<div class="dr-line">
        <div class="dr-name"><span class="cash-ln">💵 ${l.nom}</span></div>
        <div class="dr-val" style="color:var(--blue)">${fmt(l.val,2)} €</div>
        <div class="dr-pnl">—</div>
        <div class="dr-dlt">${dltHtml(l.delta, l.deltaPct, l.isNew)}</div>
      </div>`;
    } else if(l.type==='pos') {
      h += `<div class="dr-line clickable-pos" style="${closedStyle}" onclick="openPanel('${l.isin}')" title="Détails & édition">
        <div class="dr-name">
          <div class="dr-nm">${l.nom}${l.isin?`<span style="color:var(--text3);font-family:var(--mono);font-size:9px;margin-left:6px">${l.isin}</span>`:''}${l.closed?`<span class="badge-new" style="background:var(--red2);color:var(--red)">CLÔTURÉ</span>`:''}</div>
          <div class="dr-sub">${l.quantite} titres · PRU ${fmt(l.pru,2)} €</div>
        </div>
        <div class="dr-val">${fmt(l.val)} €</div>
        <div class="dr-pnl ${pc(l.pnlEur)}">
          ${l.pnlEur!=null?(l.pnlEur>=0?'+':'')+fmt(l.pnlEur)+' €':'—'}
          ${l.pnlPct!=null?`<div style="font-size:10px">${fmtPct(l.pnlPct)}</div>`:''}
        </div>
        <div class="dr-dlt">${dltHtml(l.delta, l.deltaPct, l.isNew)}</div>
      </div>`;
    } else {
      h += `<div class="dr-line" style="${closedStyle}">
        <div class="dr-name"><div class="dr-nm">${l.nom}${l.closed?`<span class="badge-new" style="background:var(--red2);color:var(--red)">CLÔTURÉ</span>`:''}</div></div>
        <div class="dr-val">${fmt(l.val,2)} €</div>
        <div class="dr-pnl">—</div>
        <div class="dr-dlt">${dltHtml(l.delta, l.deltaPct, l.isNew)}</div>
      </div>`;
    }
  });
  h += '</div></div>';
  return h;
}

function drillToggle(i) {
  const dr=document.getElementById('dr-'+i);
  const chev=document.getElementById('chv-'+i);
  if(!dr)return;
  const was=dr.classList.contains('open');
  document.querySelectorAll('.dr-row').forEach(r=>r.classList.remove('open'));
  document.querySelectorAll('.chev').forEach(c=>c.classList.remove('open'));
  if(!was){dr.classList.add('open');chev?.classList.add('open');}
}

// ══════════════════════════════════════════════════════════════════
// CHARTS
// ══════════════════════════════════════════════════════════════════
function initChartLine() {
  const snaps = MAJ_GRAPH?.snapshots||[];
  if(snaps.length<2) return;
  const canvas=document.getElementById('ch-line');
  if(!canvas)return;
  if(chartLine)chartLine.destroy();
  const labels=snaps.map(s=>new Date(s.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}));
  const keys=[{k:'pea',l:'PEA'},{k:'cto',l:'CTO'},{k:'pme',l:'PEA-PME'},{k:'av',l:'AV'},
    {k:'pee',l:'PEE'},{k:'livrets',l:'Livrets'},{k:'scpi',l:'SCPI'},{k:'revolut',l:'Revolut'}]
    .filter(d=>snaps.some(s=>(s.totaux?.[d.k]||0)>0));
  chartLine=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:keys.map(d=>({
      label:d.l,data:snaps.map(s=>s.totaux?.[d.k]||0),
      borderColor:EC[d.l]||'#4d9fff',backgroundColor:(EC[d.l]||'#4d9fff')+'15',
      fill:true,tension:.3,pointRadius:snaps.length>10?2:4,borderWidth:2,
    }))},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#7a8fa8',font:{family:"'IBM Plex Mono'",size:10},boxWidth:10}},
        tooltip:{backgroundColor:'#111722',borderColor:'#1e2a3d',borderWidth:1,
          callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.raw)} €`}}
      },
      scales:{
        x:{grid:{color:'#1e2a3d'},ticks:{color:'#3d5068',font:{family:"'IBM Plex Mono'",size:9}}},
        y:{grid:{color:'#1e2a3d'},ticks:{color:'#3d5068',font:{family:"'IBM Plex Mono'",size:9},callback:v=>fmt(v)+'€'}},
      }}
  });
}

function initChartDonut(envs,total){
  const canvas=document.getElementById('ch-donut');
  if(!canvas)return;
  if(chartDonut)chartDonut.destroy();
  chartDonut=new Chart(canvas,{
    type:'doughnut',
    data:{labels:envs.map(e=>e.nom),datasets:[{data:envs.map(e=>e.tot),backgroundColor:envs.map(e=>e.color),borderWidth:0,hoverOffset:4}]},
    options:{cutout:'68%',plugins:{
      legend:{display:false},
      tooltip:{backgroundColor:'#111722',borderColor:'#1e2a3d',borderWidth:1,
        callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.raw)} € (${(ctx.raw/total*100).toFixed(1)}%)`}}
    }}
  });
  const leg=document.getElementById('donut-leg');
  if(leg) leg.innerHTML=envs.map(e=>`
    <div class="leg-i"><div class="leg-d" style="background:${e.color}"></div>
    <span>${e.nom} ${(e.tot/total*100).toFixed(0)}%</span></div>`).join('');
}

function renderBars(data, base, colorMap) {
  const items=Object.entries(data).sort((a,b)=>b[1]-a[1]);
  const covered=Object.values(data).reduce((s,v)=>s+v,0);
  const nonClass=base-covered;
  const pctCovered=base>0?covered/base*100:0;
  if(!items.length) return `<div style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:6px 0">Aucune donnée — renseignez les métadonnées dans Actions → Infos manquantes</div>`;
  let html=items.map(([lbl,val],i)=>{
    const pct=base>0?val/base*100:0;
    const col=colorMap?.[lbl]||ANA_C[i%ANA_C.length];
    return `<div class="bar-item">
      <div class="bar-hd"><span class="bar-nm" style="color:${col}">${lbl}</span><span class="bar-nfo">${fmt(val)} € · ${pct.toFixed(1)}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>
    </div>`;
  }).join('');
  if(nonClass>50&&pctCovered<99)
    html+=`<div style="margin-top:10px;font-family:var(--mono);font-size:9px;color:var(--text3);border-top:1px solid var(--border);padding-top:8px">⚠ ${(100-pctCovered).toFixed(0)}% non classifié (${fmt(nonClass)} €) — à renseigner dans Actions</div>`;
  return html;
}

// RENDER PRINCIPAL
// ══════════════════════════════════════════════════════════════════
function render() {
  if(!MAJ?.meta?.date_maj) {
    document.getElementById('root').innerHTML=`
      <div class="empty-screen">
        <div class="empty-icon">◈</div>
        <div class="empty-ttl">Tableau de bord vide</div>
        <div class="empty-sub">Faites une première <strong style="color:var(--gold)">Mise à jour</strong> dans l'onglet ↑<br>pour initialiser votre patrimoine.<br><br>Importez vos CSV Boursorama et saisissez vos valeurs manuelles.</div>
      </div>`;
    return;
  }

  const envs     = buildEnvelopes();
  const T        = MAJ.totaux;
  const prevTotal= MAJ1?.totaux?.total || T.total;
  const delta    = T.total - prevTotal;
  const deltaPct = prevTotal>0 ? delta/prevTotal*100 : 0;
  const cashTot  = (MAJ.cash?.pea||0)+(MAJ.cash?.cto||0)+(MAJ.cash?.pme||0);
  const invCote  = (T.pea||0)+(T.cto||0)+(T.pme||0);
  const garanti  = (T.av||0)+(T.pee||0)+(T.livrets||0)+(T.scpi||0);
  const snaps    = MAJ_GRAPH?.snapshots||[];
  const nSnaps   = snaps.length;
  const {risque,themes,cats,base} = buildAnalysis();

  document.getElementById('root').innerHTML=`
    <div class="hdr">
      <div>
        <div class="hdr-lbl">Patrimoine total</div>
        <div class="hdr-tot ${pc(delta)}">${fmt(T.total)} €</div>
        <div class="hdr-delta">
          <span class="${pc(delta)}">${delta>=0?'+':''}${fmt(delta)} €</span>
          <span class="${pc(deltaPct)}" style="font-size:10px">${fmtPct(deltaPct)}</span>
          <span style="color:var(--text3);font-size:10px">vs MAJ préc. (${MAJ1?.meta?.date_maj||'—'})</span>
        </div>
      </div>
      <div class="hdr-meta">
        <div>Dernière MAJ : <span style="color:var(--text)">${MAJ.meta.date_maj}</span></div>
        <div>${envs.length} enveloppes · ${nSnaps} point(s) historique</div>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi g"><div class="kpi-lbl">Investi coté</div><div class="kpi-val">${fmt(invCote)} €</div><div class="kpi-sub">PEA · CTO · PME</div></div>
      <div class="kpi o"><div class="kpi-lbl">Garanti & non coté</div><div class="kpi-val">${fmt(garanti)} €</div><div class="kpi-sub">AV · PEE · Livrets · SCPI</div></div>
      <div class="kpi b"><div class="kpi-lbl">Cash disponible</div><div class="kpi-val">${fmt(cashTot)} €</div><div class="kpi-sub">Espèces PEA+CTO+PME</div></div>
      <div class="kpi"><div class="kpi-lbl">Total</div><div class="kpi-val">${fmt(T.total)} €</div>
        <div class="kpi-sub ${pc(delta)}">${delta>=0?'+':''}${fmt(delta)} € vs MAJ préc.</div></div>
    </div>

    <div class="sec"><div class="sec-t">Niveau 1 — Enveloppes</div><div class="sec-l"></div></div>
    ${renderTableau(envs, T.total)}

    <div class="sec"><div class="sec-t">Niveau 2 — Évolution</div><div class="sec-l"></div></div>
    <div class="ch-grid">
      <div class="ch-card"><div class="ch-lbl">Patrimoine par enveloppe</div>
        ${nSnaps>=2?'<canvas id="ch-line"></canvas>':`<div class="ch-empty">Il faut au moins 2 MAJ pour afficher la courbe (${nSnaps}/2)</div>`}
      </div>
      <div class="ch-card"><div class="ch-lbl">Répartition</div>
        <canvas id="ch-donut" style="max-height:180px"></canvas>
        <div class="leg" id="donut-leg"></div>
      </div>
    </div>

    <div class="sec"><div class="sec-t">Niveaux 3/4/5 — Risque · Thématique · Catégorie</div><div class="sec-l"></div></div>
    <div class="ana-grid">
      <div class="ana-card"><div class="ana-lbl">Niveau 3 — Risque</div>${renderBars(risque,base,RISQ_C)}</div>
      <div class="ana-card"><div class="ana-lbl">Niveau 4 — Thématiques</div>${renderBars(themes,base,null)}</div>
      <div class="ana-card"><div class="ana-lbl">Niveau 5 — Catégories</div>${renderBars(cats,base,null)}</div>
    </div>
  `;

  initChartLine();
  initChartDonut(envs, T.total);
}

// PANEL DETAIL POSITION
// ══════════════════════════════════════════════════════════════════
const RISQUES_P1=['Faible','Modéré','Élevé','Spéculatif'];
const CATS_P1=['ETF_large','ETF_sectoriel','Qualite','Cyclique','Croissance','Speculatif'];
const THEMES_P1=['Tech','Finance','Eau & Env.','Défense','Global','Asie','Matières 1ères','Santé','Infrastructure','Diversifié','Autre'];

function openPanel(isin) {
  const isinKey=(isin||'').trim().replace(/\s/g,'').toUpperCase();
  const info=(TABLE_INFOS?.valeurs||{})[isinKey]||{};
  const allPos=[...(MAJ?.pea_positions||[]),...(MAJ?.cto_positions||[]),...(MAJ?.pme_positions||[])];
  const pos=allPos.find(p=>(p.isin||'').trim().toUpperCase()===isinKey)||{};
  const z=info.zones||{};

  document.getElementById('pp-nom').textContent=info.nom||pos.nom||isin;
  document.getElementById('pp-isin').textContent=isin;

  const pnlEur=(pos.montant||0)-((pos.pru||0)*(pos.quantite||0));
  const pnlPct=(pos.pru&&pos.quantite)?pnlEur/((pos.pru||0)*(pos.quantite||0))*100:null;

  document.getElementById('pp-body').innerHTML=`
    <div class="pp-sec">Position</div>
    <div class="pp-row"><span class="pp-key">Quantité</span><span class="pp-val">${pos.quantite||'—'} titres</span></div>
    <div class="pp-row"><span class="pp-key">PRU</span><span class="pp-val">${pos.pru?fmt(pos.pru,2)+' €':'—'}</span></div>
    <div class="pp-row"><span class="pp-key">Valeur actuelle</span><span class="pp-val">${pos.montant?fmt(pos.montant)+' €':'—'}</span></div>
    <div class="pp-row"><span class="pp-key">P&L</span><span class="pp-val ${pnlPct!=null?pc(pnlPct):''}">${pnlEur!=null?(pnlEur>=0?'+':'')+fmt(pnlEur)+' €':'—'}${pnlPct!=null?' ('+fmtPct(pnlPct)+')':''}</span></div>
    <div class="pp-row"><span class="pp-key">Enveloppe</span><span class="pp-val">${info.enveloppe||pos.enveloppe||'—'}</span></div>
    <div class="pp-row"><span class="pp-key">État moteur</span><span class="pp-val">${info.etat_actuel||'—'}</span></div>

    <div class="pp-sec">Zones de cours (€)</div>
    <div class="pp-grid3">
      <div class="pp-fg"><label class="pp-fl">Basse min</label><input class="pp-fi" id="pp-z1" type="number" step="0.01" value="${z.basse_min||''}"></div>
      <div class="pp-fg"><label class="pp-fl">Basse max</label><input class="pp-fi" id="pp-z2" type="number" step="0.01" value="${z.basse_max||''}"></div>
      <div class="pp-fg"><label class="pp-fl">Surveillance</label><input class="pp-fi" id="pp-z3" type="number" step="0.01" value="${z.surveillance||''}"></div>
    </div>
    <div class="pp-grid">
      <div class="pp-fg"><label class="pp-fl">Complément</label><input class="pp-fi" id="pp-z4" type="number" step="0.01" value="${z.complement||''}"></div>
      <div class="pp-fg"><label class="pp-fl">Breakout</label><input class="pp-fi" id="pp-z5" type="number" step="0.01" value="${z.breakout||''}"></div>
    </div>

    <div class="pp-sec">Classification</div>
    <div class="pp-fg"><label class="pp-fl">Risque</label>
      <select class="pp-fi pp-select" id="pp-risque"><option value="">— Sélectionner</option>
        ${RISQUES_P1.map(r=>`<option value="${r}" ${r===(info.risque||'')?'selected':''}>${r}</option>`).join('')}
      </select></div>
    <div class="pp-fg"><label class="pp-fl">Catégorie</label>
      <select class="pp-fi pp-select" id="pp-cat"><option value="">— Sélectionner</option>
        ${CATS_P1.map(c=>`<option value="${c}" ${c===(info.categorie||'')?'selected':''}>${c}</option>`).join('')}
      </select></div>
    <div class="pp-fg"><label class="pp-fl">Thématique</label>
      <select class="pp-fi pp-select" id="pp-theme"><option value="">— Sélectionner</option>
        ${THEMES_P1.map(t=>`<option value="${t}" ${t===(info.thematique||'')?'selected':''}>${t}</option>`).join('')}
      </select></div>

    <div class="pp-sec">Description / Thèse d'investissement</div>
    <div class="pp-fg">
      <textarea class="pp-fi" id="pp-desc" rows="4" placeholder="Notes, thèse, catalyseurs…" style="resize:vertical">${info.description||''}</textarea>
    </div>

    <button class="pp-btn-save" onclick="savePanel('${isin}')">💾 Sauvegarder</button>
    <div class="pp-toast" id="pp-toast"></div>
  `;

  document.getElementById('pos-panel').classList.add('open');
  document.getElementById('pp-overlay').classList.add('open');
}

function closePanel(){
  document.getElementById('pos-panel').classList.remove('open');
  document.getElementById('pp-overlay').classList.remove('open');
}

async function savePanel(isin){
  const token=sessionStorage.getItem('hermes_gh_token')||localStorage.getItem('hermes_gh_token')||'';
  if(!token){ppToast('❌ Token absent','var(--red)');return;}
  const isinKey=(isin||'').trim().replace(/\s/g,'').toUpperCase();
  if(!TABLE_INFOS) TABLE_INFOS={meta:{},valeurs:{}};
  if(!TABLE_INFOS.valeurs[isinKey]) TABLE_INFOS.valeurs[isinKey]={isin:isinKey};
  const v=TABLE_INFOS.valeurs[isinKey];
  v.zones={
    basse_min:parseFloat(document.getElementById('pp-z1')?.value)||0,
    basse_max:parseFloat(document.getElementById('pp-z2')?.value)||0,
    surveillance:parseFloat(document.getElementById('pp-z3')?.value)||0,
    complement:parseFloat(document.getElementById('pp-z4')?.value)||0,
    breakout:parseFloat(document.getElementById('pp-z5')?.value)||0,
  };
  v.risque=document.getElementById('pp-risque')?.value||v.risque||null;
  v.categorie=document.getElementById('pp-cat')?.value||v.categorie||null;
  v.thematique=document.getElementById('pp-theme')?.value||v.thematique||null;
  v.description=document.getElementById('pp-desc')?.value?.trim()||v.description||null;
  ppToast('⏳ Sauvegarde…','var(--text3)');
  const url='https://api.github.com/repos/Cookiem420/hermes-data/contents/table_infos_valeurs.json';
  async function getSha(){try{const r=await fetch(url,{headers:{Authorization:`token ${token}`}});if(r.ok){const j=await r.json();return j.sha;}}catch(e){}return null;}
  const sha=await getSha();
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(TABLE_INFOS,null,2))));
  const body={message:`📍 Infos ${v.nom||isin}`,content};
  if(sha) body.sha=sha;
  let r=await fetch(url,{method:'PUT',headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.status===409){const sha2=await getSha();if(sha2){body.sha=sha2;r=await fetch(url,{method:'PUT',headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});}}
  r.ok?ppToast('✅ Sauvegardé','var(--green)'):ppToast('❌ Erreur '+r.status,'var(--red)');
}

function ppToast(msg,color='var(--green)'){
  const el=document.getElementById('pp-toast');
  if(!el)return;
  el.textContent=msg;el.style.color=color;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},2500);
}

load();
</script>
