<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mise à jour</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#06090f;--bg2:#0b0f18;--bg3:#111722;--bg4:#1a2133;
  --border:#1e2a3d;--border2:#2a3a52;
  --text:#e8eef7;--text2:#7a8fa8;--text3:#3d5068;
  --green:#00d68f;--green2:rgba(0,214,143,.1);
  --red:#ff4d6a;--red2:rgba(255,77,106,.1);
  --blue:#4d9fff;--blue2:rgba(77,159,255,.1);
  --gold:#f0b429;--gold2:rgba(240,180,41,.1);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;overflow-y:auto}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.page{max-width:920px;margin:0 auto;padding:28px 28px 80px}
.page-title{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.page-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:28px;letter-spacing:1px}

/* STEPS */
.steps{display:flex;gap:0;margin-bottom:28px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.step-btn{flex:1;padding:10px 8px;text-align:center;cursor:pointer;font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--text3);background:var(--bg2);border-right:1px solid var(--border);transition:background .12s,color .12s}
.step-btn:last-child{border-right:none}
.step-btn.active{background:var(--blue2);color:var(--blue)}
.step-btn.done{background:var(--green2);color:var(--green)}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:14px}
.card-title{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.badge{font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:3px}
.badge-blue{background:var(--blue2);color:var(--blue)}
.badge-green{background:var(--green2);color:var(--green)}
.badge-gold{background:var(--gold2);color:var(--gold)}

/* DROPZONE */
.dz{border:2px dashed var(--border2);border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:10px}
.dz:hover,.dz.drag{border-color:var(--blue);background:var(--blue2)}
.dz-icon{font-size:24px;margin-bottom:6px}
.dz-label{font-family:var(--mono);font-size:10px;color:var(--text3)}
.dz-label strong{color:var(--text2)}
input[type=file]{display:none}

/* CSV PREVIEW */
.csv-ok{display:inline-flex;align-items:center;gap:6px;background:var(--green2);border:1px solid rgba(0,214,143,.3);border-radius:4px;padding:4px 10px;font-family:var(--mono);font-size:10px;color:var(--green);margin-bottom:8px}
.csv-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px}
.csv-tbl th{background:var(--bg3);font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;padding:7px 10px;border-bottom:1px solid var(--border)}
.csv-tbl th:not(:first-child){text-align:right}
.csv-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px}
.csv-tbl td:not(:first-child){text-align:right}
.csv-tbl tr:last-child td{border-bottom:none}
.csv-tbl .trow-total{background:var(--bg3);font-weight:700;color:var(--gold)}

/* INPUTS */
.fi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fi-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.fi{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--blue)}
.fi[readonly]{color:var(--text2)}

/* SAISIE TABLE */
.st{width:100%;border-collapse:collapse;margin-bottom:8px}
.st th{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;padding:8px 10px;background:var(--bg3);border-bottom:1px solid var(--border);text-align:left}
.st th:last-child{text-align:right;width:140px}
.st td{padding:5px 10px;border-bottom:1px solid var(--border);font-size:12px}
.st td:last-child{text-align:right}
.st tr:last-child td{border-bottom:none}
.si{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:3px 4px;width:100%;outline:none;text-align:right;transition:border-color .15s}
.si:focus{border-color:var(--blue)}
.st .tr-tot{background:var(--bg3);font-weight:700;font-family:var(--mono);color:var(--gold)}

/* TOTAUX */
.tot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.tot-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px}
.tot-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.tot-val{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--gold)}
.tot-val.big{font-size:22px}

/* BOUTONS */
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{padding:10px 20px;border-radius:6px;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-back{background:var(--border2);color:var(--text2)}
.btn-next{background:var(--blue);color:#fff;flex:1}
.btn-save{background:var(--green);color:var(--bg);flex:1;font-weight:700;font-size:14px}
.btn-add{padding:6px 12px;font-size:11px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:4px;cursor:pointer;margin-top:6px}
.btn-add:hover{background:var(--bg4)}

/* TOKEN */
.token-info{background:var(--blue2);border:1px solid rgba(77,159,255,.2);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--blue);margin-bottom:14px;line-height:1.8}

/* SUCCESS */
.success{text-align:center;padding:48px 20px}
.success-icon{font-size:52px;margin-bottom:16px}
.success-ttl{font-size:16px;font-weight:600;margin-bottom:8px}
.success-tot{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--gold);margin:12px 0}
.success-sub{font-family:var(--mono);font-size:11px;color:var(--green)}

.helper{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:12px;line-height:1.7}
.divider{height:1px;background:var(--border);margin:16px 0}
</style>
</head>
<body>
<div class="page">
  <div class="page-title">↑ Mise à jour</div>
  <div class="page-sub">ACTUALISATION MANUELLE DU PATRIMOINE</div>
  <div class="steps" id="steps-bar"></div>
  <div id="step-content"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════
const GH_USER   = 'Cookiem420';
const GH_REPO   = 'hermes-data';
const GH_API    = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/`;
const RAW_BASE  = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/`;

const FILES = {
  donnee:    'donnee_maj.json',
  historique:'historique_maj.json',
  infos:     'table_infos_valeurs.json',
};

// ══════════════════════════════════════════════════════════════════
// ÉTAT WIZARD
// ══════════════════════════════════════════════════════════════════
const STEPS = [
  {id:'csv',   label:'CSV cotés'},
  {id:'av',    label:'Ass. Vie'},
  {id:'pee',   label:'PEE'},
  {id:'autres',label:'Livrets & +'},
  {id:'recap', label:'Récap'},
  {id:'token', label:'Sauvegarde'},
];

let step = 0;

// Données collectées
const D = {
  pea: [], cto: [], pme: [],          // positions CSV
  cash_pea:0, cash_cto:0, cash_pme:0,
  av:  [],                             // [{nom, valeur}]
  pee: [],                             // [{nom, valeur}]
  livret_a:0, livret_usd:0, livret_eur:0,
  scpi:0, revolut:0, cc:0,
};

// Données existantes chargées depuis GitHub
let EXISTING_DONNEE     = null;
let EXISTING_HISTORIQUE = null;

// Fonds AV fixes (personnalisables dans l'étape)
const AV_FONDS_DEFAULT = [
  'Fonds en euros',
  'Echiquier Agenor Mid Cap Europ',
  'Pictet Global Megatrend',
  'DWS Concept Kaldemorgen',
  'DWS Top Dividende',
  'Eurose',
  'ANDERA Dette Privée',
];

const PEE_FONDS_DEFAULT = [
  'HSBC EE EURO PME F',
  'HSBC EE ACTIONS EUROPE SOLUTIONS CLIMAT F',
  'HSBC EE ISR ACTIONS EURO F',
  'HSBC EE ISR DIVERSIFIE ET SOLIDAIRE G',
  'HSBC EE ISR ACTIONS MONDE F',
];

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
async function init() {
  // Pré-remplir AV et PEE avec les fonds par défaut
  if (D.av.length === 0)  D.av  = AV_FONDS_DEFAULT.map(n => ({nom:n,valeur:0}));
  if (D.pee.length === 0) D.pee = PEE_FONDS_DEFAULT.map(n => ({nom:n,valeur:0}));

  // Charger les données existantes
  try {
    const [dr, hr] = await Promise.all([
      fetch(RAW_BASE + FILES.donnee  + '?t=' + Date.now()),
      fetch(RAW_BASE + FILES.historique + '?t=' + Date.now()),
    ]);
    if (dr.ok) EXISTING_DONNEE     = await dr.json();
    if (hr.ok) EXISTING_HISTORIQUE = await hr.json();
  } catch(e) { console.warn('Chargement données existantes:', e); }

  renderStep();
}

// ══════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════
function renderStepsBar() {
  document.getElementById('steps-bar').innerHTML = STEPS.map((s,i) => `
    <div class="step-btn ${i===step?'active':i<step?'done':''}">
      ${i<step?'✓ ':''}${s.label}
    </div>`).join('');
}

function renderStep() {
  renderStepsBar();
  const renders = {csv:rCSV, av:rAV, pee:rPEE, autres:rAutres, recap:rRecap, token:rToken};
  document.getElementById('step-content').innerHTML = renders[STEPS[step].id]();
  afterRender(STEPS[step].id);
}

function goNext() { if(step<STEPS.length-1){step++;renderStep();} }
function goBack() { if(step>0){step--;renderStep();} }

function afterRender(id) {
  if(id==='csv')    { /* listeners CSV déjà sur elements */ }
  if(id==='av')     { updAV(); }
  if(id==='pee')    { updPEE(); }
  if(id==='autres') { updAutres(); }
}

// ══════════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════════
function fmt(n,d=0){if(!n&&n!==0)return'—';return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)}
function parseNum(v){
  if(v==null) return 0;
  // Nettoyer : guillemets, espaces (séparateurs milliers FR), virgule → point
  const s = String(v).replace(/"/g,'').replace(/\s/g,'').replace(/,/g,'.');
  // Si plusieurs points (ex 1.234.56 suite à remplacement), garder seulement le dernier
  const parts = s.split('.');
  const clean = parts.length > 2
    ? parts.slice(0,-1).join('') + '.' + parts[parts.length-1]
    : s;
  return parseFloat(clean) || 0;
}
function today(){return new Date().toISOString().split('T')[0]}

// ══════════════════════════════════════════════════════════════════
// ÉTAPE 1 — CSV + Cash
// ══════════════════════════════════════════════════════════════════
function rCSV() {
  const mkDZ = (env, label) => `
    <div class="card">
      <div class="card-title">${label} <span class="badge badge-blue">${env.toUpperCase()}</span></div>
      <div class="helper">Exporter depuis Boursorama → Mon compte → Télécharger relevé CSV ou Excel</div>
      <div class="dz" id="dz-${env}"
        onclick="document.getElementById('fi-${env}').click()"
        ondragover="event.preventDefault();document.getElementById('dz-${env}').classList.add('drag')"
        ondragleave="document.getElementById('dz-${env}').classList.remove('drag')"
        ondrop="event.preventDefault();document.getElementById('dz-${env}').classList.remove('drag');handleDrop(event,'${env}')">
        <div class="dz-icon">📄</div>
        <div class="dz-label"><strong>Glisser CSV / XLSX ${env.toUpperCase()}</strong> ou cliquer</div>
      </div>
      <input type="file" id="fi-${env}" accept=".csv,.xlsx,.xls" onchange="handleFile(this,'${env}')">
      <div id="prev-${env}"></div>
    </div>`;

  return `
    ${mkDZ('pea','📂 Import Boursorama')}
    ${mkDZ('cto','📂 Import Boursorama')}
    ${mkDZ('pme','📂 Import Boursorama')}

    <div class="card">
      <div class="card-title">💵 Espèces disponibles <span class="badge badge-blue">inclus dans le total</span></div>
      <div class="helper">Saisir le solde en espèces de chaque poche — affiché séparément dans le tableau</div>
      <div class="fi-grid-3">
        <div class="fg"><label class="fl">Espèces PEA (€)</label>
          <input class="fi" id="cash-pea" type="number" step="0.01" placeholder="0.00"
            value="${D.cash_pea||''}" oninput="D.cash_pea=parseFloat(this.value)||0"></div>
        <div class="fg"><label class="fl">Espèces CTO (€)</label>
          <input class="fi" id="cash-cto" type="number" step="0.01" placeholder="0.00"
            value="${D.cash_cto||''}" oninput="D.cash_cto=parseFloat(this.value)||0"></div>
        <div class="fg"><label class="fl">Espèces PEA-PME (€)</label>
          <input class="fi" id="cash-pme" type="number" step="0.01" placeholder="0.00"
            value="${D.cash_pme||''}" oninput="D.cash_pme=parseFloat(this.value)||0"></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-next" onclick="goNext()">Suivant →</button>
    </div>`;
}

// ── CSV parsing ───────────────────────────────────────────────────
function handleDrop(e, env) {
  const f = e.dataTransfer.files[0];
  if(f) processFile(f, env);
}
function handleFile(input, env) {
  if(input.files[0]) processFile(input.files[0], env);
}

function processFile(file, env) {
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let rows;
      if(ext==='csv') {
        rows = parseCSVText(e.target.result);
      } else {
        const wb = XLSX.read(e.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false});
      }
      const positions = parsePositions(rows, env);
      D[env] = positions;
      showPreview(env, positions, file.name);
    } catch(err) {
      document.getElementById('prev-'+env).innerHTML =
        `<div style="color:var(--red);font-family:var(--mono);font-size:10px;padding:8px">Erreur : ${err.message}</div>`;
      console.error(err);
    }
  };
  if(ext==='csv') reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

function parseCSVText(text) {
  // Parser CSV correct gérant les champs entre guillemets (RFC 4180)
  const sep = text.split('\n')[0].includes(';') ? ';' : ',';
  const lines = text.split('\n');
  return lines.map(line => {
    const fields = [];
    let cur = '', inQ = false;
    for(let i=0; i<line.length; i++) {
      const c = line[i];
      if(c==='"') { inQ=!inQ; }
      else if(c===sep && !inQ) { fields.push(cur.trim()); cur=''; }
      else { cur+=c; }
    }
    fields.push(cur.trim());
    return fields;
  });
}

function parsePositions(rows, env) {
  const positions = [];
  let headerIdx = -1;
  let cols = {nom:-1, isin:-1, qty:-1, pru:-1, cours:-1, montant:-1};

  for(let i=0; i<Math.min(rows.length,10); i++) {
    const row = rows[i].map(c=>String(c||'').replace(/^[\uFEFF\s]+/,'').toLowerCase().replace(/[^a-z]/g,''));
    if(row.includes('name')||row.includes('isin')||row.includes('buyingprice')) {
      headerIdx = i;
      row.forEach((cell,j)=>{
        if(cell==='name'||cell.includes('libel')||cell.includes('titre')) cols.nom=j;
        else if(cell==='isin') cols.isin=j;
        else if(cell==='quantity'||cell.includes('quantit')) cols.qty=j;
        else if(cell==='buyingprice'||cell==='pru'||cell.includes('prixmoyen')||cell.includes('prixrev')) cols.pru=j;
        else if(cell==='lastprice') cols.cours=j;
        else if(cell==='amount'||cell==='montant'||cell.includes('valoris')) cols.montant=j;
      });
      console.log('['+env+'] Header r'+i+' cols:',JSON.stringify(cols));
      break;
    }
  }

  if(headerIdx===-1){
    const kws=['name','isin','quantity','buyingprice','lastprice','amount'];
    for(let i=0;i<Math.min(rows.length,15);i++){
      const row=rows[i].map(c=>String(c||'').toLowerCase().replace(/[^a-z]/g,''));
      if(row.filter(c=>kws.some(k=>c.includes(k))).length>=3){
        headerIdx=i;
        row.forEach((cell,j)=>{
          if(cell.includes('name')||cell.includes('libel')) cols.nom=j;
          if(cell==='isin') cols.isin=j;
          if(cell.includes('quantit')) cols.qty=j;
          if(cell.includes('buyingprice')||cell==='pru') cols.pru=j;
          if(cell.includes('lastprice')) cols.cours=j;
          if(cell==='amount'||cell.includes('valoris')) cols.montant=j;
        });
        break;
      }
    }
  }

  if(headerIdx>=0){
    for(let i=headerIdx+1;i<rows.length;i++){
      const row=rows[i];
      if(!row||row.length<2) continue;
      if(row.every(c=>!String(c||'').trim())) continue;
      const cl=c=>String(c||'').trim().replace(/^"|"$/g,'');
      const nom   =cols.nom>=0    ?cl(row[cols.nom]):'';
      const isin  =cols.isin>=0   ?cl(row[cols.isin]).replace(/\s/g,''):'';
      const qty   =cols.qty>=0    ?parseNum(row[cols.qty]):0;
      const pru   =cols.pru>=0    ?parseNum(row[cols.pru]):0;
      const cours =cols.cours>=0  ?parseNum(row[cols.cours]):0;
      let montant =cols.montant>=0?parseNum(row[cols.montant]):0;
      if(!montant&&qty>0&&cours>0) montant=qty*cours;
      if(!montant&&qty>0&&pru>0)   montant=qty*pru;
      if(!nom||/^(total|sous.total|solde)$/i.test(nom.trim())) continue;
      if(qty<=0&&montant<=0) continue;
      positions.push({nom,isin,quantite:qty,pru,montant});
    }
  } else {
    console.warn('['+env+'] Header non détecté — fallback ISIN');
    const isinRe=/^[A-Z]{2}[A-Z0-9]{10}$/;
    rows.forEach(row=>{
      const strs=row.map(c=>String(c||'').trim().replace(/^"|"$/g,''));
      const ii=strs.findIndex(c=>isinRe.test(c));
      if(ii>=0){
        const isin=strs[ii];
        const nom=strs.find((c,i)=>i<ii&&c.length>2&&!/^[\d,.]/g.test(c))||isin;
        const nums=strs.map(parseNum).filter(n=>n>0);
        positions.push({nom,isin,quantite:nums[0]||0,pru:nums[1]||0,montant:nums[nums.length-1]||0});
      }
    });
  }
  console.log('['+env+'] '+positions.length+' positions');
  return positions;
}
function showPreview(env, positions, fname) {
  const total = positions.reduce((s,p)=>s+p.montant,0);
  const envUp = {pea:'PEA',cto:'CTO',pme:'PEA-PME'}[env];

  const trows = positions.map(p=>`
    <tr>
      <td>${p.nom}</td>
      <td style="font-size:10px">${p.isin||'—'}</td>
      <td>${p.quantite}</td>
      <td>${p.pru>0?p.pru.toFixed(2)+' €':'—'}</td>
      <td>${p.cours>0?p.cours.toFixed(2)+' €':'—'}</td>
      <td>${p.montant.toFixed(2)} €</td>
    </tr>`).join('');

  document.getElementById('prev-'+env).innerHTML = `
    <div class="csv-ok">✅ ${fname} — ${positions.length} ligne(s) importée(s)</div>
    <table class="csv-tbl">
      <thead><tr><th>Titre</th><th>ISIN</th><th>Qté</th><th>PRU</th><th>Cours</th><th>Valeur</th></tr></thead>
      <tbody>
        ${trows}
        <tr class="trow-total">
          <td colspan="4">Total ${envUp} (positions)</td>
          <td>${total.toFixed(2)} €</td>
        </tr>
      </tbody>
    </table>`;
}

// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════
// ÉTAPE 5 — RÉCAP
// ══════════════════════════════════════════════════════════════════
function computeTotaux() {
  const pea_pos  = D.pea.reduce((s,p)=>s+p.montant,0);
  const cto_pos  = D.cto.reduce((s,p)=>s+p.montant,0);
  const pme_pos  = D.pme.reduce((s,p)=>s+p.montant,0);
  const pea      = pea_pos + (D.cash_pea||0);
  const cto      = cto_pos + (D.cash_cto||0);
  const pme      = pme_pos + (D.cash_pme||0);
  const av       = D.av.reduce((s,f)=>s+(f.valeur||0),0);
  const pee      = D.pee.reduce((s,f)=>s+(f.valeur||0),0);
  const livrets  = (D.livret_a||0)+(D.livret_usd||0)+(D.livret_eur||0)+(D.cc||0);
  const scpi     = D.scpi||0;
  const revolut  = D.revolut||0;
  const total    = pea+cto+pme+av+pee+livrets+scpi+revolut;
  return {pea,cto,pme,av,pee,livrets,scpi,revolut,total,
          pea_pos,cto_pos,pme_pos,
          cash_pea:D.cash_pea,cash_cto:D.cash_cto,cash_pme:D.cash_pme};
}

// ══════════════════════════════════════════════════════════════════
// SAUVEGARDE — LOGIQUE MÉTIER
// ══════════════════════════════════════════════════════════════════
async function save() {
  const token = sessionStorage.getItem('hermes_gh_token')||'';
  if(!token) { alert('Token GitHub requis'); return; }

  showMsg('⏳ Sauvegarde en cours...','var(--text3)');

  try {
    const t     = computeTotaux();
    const dateJ = today();

    // ── 1. Construire donnee_maj (nouvelles données courantes) ────
    const newDonnee = {
      meta: { date_maj: dateJ, version: '2.0' },
      cash: { pea: D.cash_pea, cto: D.cash_cto, pme: D.cash_pme },
      pea_positions: D.pea,
      cto_positions: D.cto,
      pme_positions: D.pme,
      av:  D.av.filter(f=>f.valeur>0),
      pee: D.pee.filter(f=>f.valeur>0),
      livrets: [
        {nom:'Livret A',   valeur:D.livret_a||0},
        {nom:'Livret $',   valeur:D.livret_usd||0},
        {nom:'Livret euro',valeur:D.livret_eur||0},
        {nom:'Compte courant',valeur:D.cc||0},
      ].filter(l=>l.valeur>0),
      scpi:    D.scpi||0,
      revolut: D.revolut||0,
      totaux: {
        pea:t.pea, cto:t.cto, pme:t.pme,
        av:t.av,   pee:t.pee, livrets:t.livrets,
        scpi:t.scpi, revolut:t.revolut, total:t.total,
      },
    };

    // ── 2. Ajouter snapshot dans historique ───────────────────────
    const hist  = EXISTING_HISTORIQUE || {snapshots:[]};
    const snap  = {
      date:    dateJ,
      totaux: newDonnee.totaux,
    };
    // Remplacer si même date, sinon ajouter
    const idx = hist.snapshots.findIndex(s=>s.date===dateJ);
    if(idx>=0) hist.snapshots[idx] = snap;
    else hist.snapshots.push(snap);

    // ── 3. Sauvegarder les 2 fichiers sur GitHub ──────────────────
    showMsg('⏳ Écriture donnee_maj.json...','var(--text3)');
    const ok1 = await ghPut(token, FILES.donnee, newDonnee,
      `📊 MAJ ${dateJ} — Total ${fmt(t.total)} €`);

    showMsg('⏳ Écriture historique_maj.json...','var(--text3)');
    const ok2 = await ghPut(token, FILES.historique, hist,
      `📈 Historique MAJ ${dateJ}`);

    if(ok1 && ok2) {
      EXISTING_DONNEE     = newDonnee;
      EXISTING_HISTORIQUE = hist;
      // Afficher succès
      document.getElementById('step-content').innerHTML = `
        <div class="card success">
          <div class="success-icon">✅</div>
          <div class="success-ttl">Mise à jour enregistrée</div>
          <div class="success-tot">${t.total.toFixed(2)} €</div>
          <div class="success-sub">
            Snapshot du ${dateJ} sauvegardé<br>
            ${hist.snapshots.length} point(s) d'historique
          </div>
        </div>`;
    } else {
      showMsg('❌ Erreur sauvegarde — vérifier le token et les permissions GitHub','var(--red)');
    }

  } catch(e) {
    showMsg('❌ '+e.message,'var(--red)');
  }
}

function showMsg(msg, color) {
  document.getElementById('save-msg').innerHTML =
    `<div style="font-family:var(--mono);font-size:11px;color:${color};padding:10px 0">${msg}</div>`;
}

// ── GitHub API ────────────────────────────────────────────────────
async function ghPut(token, filename, data, message) {
  const url = GH_API + filename;
  let sha = null;
  try {
    const gr = await fetch(url, {headers:{Authorization:`token ${token}`}});
    if(gr.ok) { const j=await gr.json(); sha=j.sha; }
  } catch(e) {}

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const body    = {message, content};
  if(sha) body.sha = sha;

  const r = await fetch(url, {
    method:'PUT',
    headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if(!r.ok) console.error('GitHub PUT failed:', filename, r.status, await r.text());
  return r.ok;
}
