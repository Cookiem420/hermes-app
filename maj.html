<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mise à jour</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#06090f;--bg2:#0b0f18;--bg3:#111722;--bg4:#1a2133;
  --border:#1e2a3d;--border2:#2a3a52;
  --text:#e8eef7;--text2:#7a8fa8;--text3:#3d5068;
  --green:#00d68f;--green2:rgba(0,214,143,.1);
  --red:#ff4d6a;--red2:rgba(255,77,106,.1);
  --blue:#4d9fff;--blue2:rgba(77,159,255,.1);
  --gold:#f0b429;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;overflow-y:auto}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.page{max-width:900px;margin:0 auto;padding:32px 32px 80px}

/* HEADER */
.page-title{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.page-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:32px}

/* STEPS INDICATOR */
.steps{display:flex;gap:0;margin-bottom:32px}
.step-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.step-item:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;width:100%;height:1px;background:var(--border2);z-index:0}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--text3);z-index:1;position:relative}
.step-num.active{background:var(--blue);border-color:var(--blue);color:#fff}
.step-num.done{background:var(--green2);border-color:var(--green);color:var(--green)}
.step-label{font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:5px;letter-spacing:1px;text-align:center}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px}
.card-title{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title-badge{background:var(--blue2);color:var(--blue);padding:2px 7px;border-radius:3px;font-size:8px}

/* DROP ZONE */
.dropzone{border:2px dashed var(--border2);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:12px}
.dropzone:hover,.dropzone.drag{border-color:var(--blue);background:var(--blue2)}
.dropzone-icon{font-size:28px;margin-bottom:8px}
.dropzone-label{font-family:var(--mono);font-size:10px;color:var(--text3)}
.dropzone-label strong{color:var(--text2)}
input[type=file]{display:none}

/* TABLEAU CSV PREVIEW */
.csv-preview{margin-bottom:12px}
.csv-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green2);border:1px solid var(--green);border-radius:4px;padding:4px 10px;font-family:var(--mono);font-size:10px;color:var(--green);margin-bottom:8px}
.csv-table{width:100%;border-collapse:collapse;font-size:11px}
.csv-table th{background:var(--bg3);font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;padding:7px 10px;text-align:right;border-bottom:1px solid var(--border)}
.csv-table th:first-child{text-align:left}
.csv-table td{padding:7px 10px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono)}
.csv-table td:first-child{text-align:left;color:var(--text)}
.csv-table tr:last-child td{border-bottom:none}
.csv-total{font-weight:700;background:var(--bg3);color:var(--gold)}

/* INPUTS */
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fi-group{display:flex;flex-direction:column;gap:5px}
.fi-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.fi-input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .15s;width:100%}
.fi-input:focus{border-color:var(--blue)}
.fi-input[readonly]{color:var(--text2);cursor:default}

/* TABLE SAISIE */
.saisie-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.saisie-table th{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;padding:8px 10px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border)}
.saisie-table th:last-child{text-align:right}
.saisie-table td{padding:6px 10px;border-bottom:1px solid var(--border)}
.saisie-table td:last-child{text-align:right}
.saisie-input{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:3px 6px;width:100%;outline:none;text-align:right;transition:border-color .15s}
.saisie-input:focus{border-color:var(--blue)}
.saisie-nom{font-size:12px;color:var(--text)}
.saisie-total-row td{background:var(--bg3);font-family:var(--mono);font-weight:700;color:var(--gold)}

/* TOTAUX */
.totaux-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.tot-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.tot-label{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.tot-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--gold)}

/* BOUTONS */
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{padding:10px 20px;border-radius:6px;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-p{background:var(--border2);color:var(--text2)}
.btn-n{background:var(--blue);color:#fff;flex:1}
.btn-save{background:var(--green);color:var(--bg);flex:1;font-weight:700}
.btn-sm{padding:6px 12px;font-size:11px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:4px;cursor:pointer}
.btn-sm:hover{background:var(--bg4)}

/* TOKEN */
.token-info{background:var(--blue2);border:1px solid rgba(77,159,255,.2);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--blue);margin-bottom:14px}

/* SUCCESS */
.success-card{text-align:center;padding:40px 20px}
.success-icon{font-size:48px;margin-bottom:16px}
.success-title{font-size:16px;font-weight:600;margin-bottom:8px}
.success-sub{font-family:var(--mono);font-size:11px;color:var(--green)}
.success-total{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--gold);margin:12px 0}

/* UTIL */
.sec-line{height:1px;background:var(--border);margin:16px 0}
.helper{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:12px}
</style>
</head>
<body>
<div class="page">
  <div class="page-title">↑ Mise à jour</div>
  <div class="page-sub">MISE À JOUR MANUELLE DU PATRIMOINE</div>

  <!-- Indicateur étapes -->
  <div class="steps" id="steps-indicator"></div>

  <!-- Contenu de l'étape courante -->
  <div id="step-content"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════
const GITHUB_USER = 'Cookiem420';
const DATA_REPO   = 'hermes-data';
const STATE_URL   = `https://raw.githubusercontent.com/${GITHUB_USER}/${DATA_REPO}/main/portfolio_state.json`;
const CONFIG_URL  = `https://raw.githubusercontent.com/${GITHUB_USER}/${DATA_REPO}/main/config_watchlist.json`;

// Définition des étapes du wizard
const STEPS = [
  { id:'csv',    label:'CSV cotés' },
  { id:'cash',   label:'Cash' },
  { id:'av',     label:'AV' },
  { id:'pee',    label:'PEE' },
  { id:'autres', label:'Livrets & +' },
  { id:'recap',  label:'Récap' },
  { id:'token',  label:'Sauvegarde' },
];

// Données collectées
const MAJ = {
  pea_positions: [],   // [{isin, nom, quantite, pru, montant}]
  cto_positions: [],
  pme_positions: [],
  cash_pea: 0, cash_cto: 0, cash_pme: 0,
  av: [],              // [{nom, valeur}]
  pee: [],             // [{nom, valeur}]
  livret_a: 0, livret_usd: 0, livret_eur: 0,
  scpi: 0, revolut: 0, cc: 0,
};

// Données depuis GitHub
let STATE_DATA = null;

let currentStep = 0;

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
async function init() {
  // Charger state existant pour conserver l'historique
  try {
    const r = await fetch(STATE_URL + '?t=' + Date.now());
    if (r.ok) STATE_DATA = await r.json();
  } catch(e) { console.warn('State non chargé:', e); }

  renderStep();
}

// ══════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════
function renderStepsIndicator() {
  document.getElementById('steps-indicator').innerHTML = STEPS.map((s,i)=>`
    <div class="step-item">
      <div class="step-num ${i<currentStep?'done':i===currentStep?'active':''}">
        ${i<currentStep?'✓':(i+1)}
      </div>
      <div class="step-label">${s.label}</div>
    </div>`).join('');
}

function renderStep() {
  renderStepsIndicator();
  const s = STEPS[currentStep];
  const renderers = {
    csv:    renderStepCSV,
    cash:   renderStepCash,
    av:     renderStepAV,
    pee:    renderStepPEE,
    autres: renderStepAutres,
    recap:  renderStepRecap,
    token:  renderStepToken,
  };
  document.getElementById('step-content').innerHTML = renderers[s.id]();
  initStepListeners(s.id);
}

function next() { if (currentStep < STEPS.length-1) { currentStep++; renderStep(); } }
function prev() { if (currentStep > 0) { currentStep--; renderStep(); } }

// ══════════════════════════════════════════════════════════════════
// ÉTAPE 1 — CSV cotés (PEA / CTO / PEA-PME)
// ══════════════════════════════════════════════════════════════════
function renderStepCSV() {
  return `
    <div class="card">
      <div class="card-title">📂 Import CSV / XLSX Boursorama <span class="card-title-badge">PEA</span></div>
      <div class="helper">Exporter depuis Boursorama : Mes comptes → PEA → Télécharger</div>
      <div class="dropzone" id="dz-pea" onclick="document.getElementById('f-pea').click()"
        ondragover="dzOver(event,'dz-pea')" ondragleave="dzLeave('dz-pea')" ondrop="dzDrop(event,'pea')">
        <div class="dropzone-icon">📄</div>
        <div class="dropzone-label"><strong>Glisser le CSV/XLSX PEA</strong> ou cliquer pour parcourir</div>
      </div>
      <input type="file" id="f-pea" accept=".csv,.xlsx,.xls" onchange="parseFile(this,'pea')">
      <div id="preview-pea"></div>
    </div>

    <div class="card">
      <div class="card-title">📂 Import CSV / XLSX Boursorama <span class="card-title-badge">CTO</span></div>
      <div class="dropzone" id="dz-cto" onclick="document.getElementById('f-cto').click()"
        ondragover="dzOver(event,'dz-cto')" ondragleave="dzLeave('dz-cto')" ondrop="dzDrop(event,'cto')">
        <div class="dropzone-icon">📄</div>
        <div class="dropzone-label"><strong>Glisser le CSV/XLSX CTO</strong> ou cliquer pour parcourir</div>
      </div>
      <input type="file" id="f-cto" accept=".csv,.xlsx,.xls" onchange="parseFile(this,'cto')">
      <div id="preview-cto"></div>
    </div>

    <div class="card">
      <div class="card-title">📂 Import CSV / XLSX Boursorama <span class="card-title-badge">PEA-PME</span></div>
      <div class="dropzone" id="dz-pme" onclick="document.getElementById('f-pme').click()"
        ondragover="dzOver(event,'dz-pme')" ondragleave="dzLeave('dz-pme')" ondrop="dzDrop(event,'pme')">
        <div class="dropzone-icon">📄</div>
        <div class="dropzone-label"><strong>Glisser le CSV/XLSX PEA-PME</strong> ou cliquer pour parcourir</div>
      </div>
      <input type="file" id="f-pme" accept=".csv,.xlsx,.xls" onchange="parseFile(this,'pme')">
      <div id="preview-pme"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-n" onclick="next()">Suivant →</button>
    </div>
  `;
}

// ── Parsing CSV / XLSX ────────────────────────────────────────────
function dzOver(e, id) { e.preventDefault(); document.getElementById(id).classList.add('drag'); }
function dzLeave(id) { document.getElementById(id).classList.remove('drag'); }
function dzDrop(e, env) {
  e.preventDefault();
  dzLeave('dz-'+env);
  const file = e.dataTransfer.files[0];
  if (file) parseFileObj(file, env);
}

function parseFile(input, env) {
  const file = input.files[0];
  if (file) parseFileObj(file, env);
}

function parseFileObj(file, env) {
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      let rows = [];
      if (ext === 'csv') {
        rows = parseCSV(e.target.result);
      } else {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      }
      const positions = extractPositions(rows, env);
      MAJ[env + '_positions'] = positions;
      renderCSVPreview(env, positions, file.name);
    } catch(err) {
      document.getElementById('preview-'+env).innerHTML =
        `<div style="color:var(--red);font-family:var(--mono);font-size:10px;padding:8px 0">Erreur lecture : ${err.message}</div>`;
    }
  };

  if (ext === 'csv') reader.readAsText(file, 'UTF-8');
  else reader.readAsArrayBuffer(file);
}

function parseCSV(text) {
  const lines = text.split('\n');
  const sep = text.includes(';') ? ';' : ',';
  return lines.map(l => l.split(sep).map(c => c.trim().replace(/^"|"$/g,'')));
}

function extractPositions(rows, env) {
  // Chercher les colonnes clés dans les headers
  const positions = [];
  let headerRow = -1;
  let cols = { nom:-1, isin:-1, qty:-1, pru:-1, montant:-1 };

  for (let i = 0; i < Math.min(rows.length, 15); i++) {
    const row = rows[i].map(c => String(c||'').toLowerCase());
    // Chercher la ligne d'entête
    const hasHeader = row.some(c =>
      c.includes('isin') || c.includes('quantit') || c.includes('cours') ||
      c.includes('valoris') || c.includes('titre') || c.includes('valeur'));
    if (hasHeader) {
      headerRow = i;
      row.forEach((c, j) => {
        if (c.includes('titre') || c.includes('libel') || c.includes('nom') || c.includes('valeur mob')) cols.nom = j;
        if (c.includes('isin') || c.includes('code')) cols.isin = j;
        if (c.includes('quantit') || c.includes('nbr') || c.includes('nbre')) cols.qty = j;
        if (c.includes('pru') || c.includes('prix rev') || c.includes('prix moyen') || c.includes('cours achat')) cols.pru = j;
        if (c.includes('valoris') || c.includes('montant') || c.includes('valeur') && !c.includes('mob')) cols.montant = j;
      });
      break;
    }
  }

  if (headerRow === -1) {
    // Essayer une détection par contenu (lignes avec des valeurs numériques)
    return extractPositionsFallback(rows);
  }

  for (let i = headerRow + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.every(c => !c)) continue;

    const nom     = cols.nom >= 0 ? String(row[cols.nom]||'').trim() : '';
    const isin    = cols.isin >= 0 ? String(row[cols.isin]||'').trim() : '';
    const qty     = cols.qty >= 0 ? parseNum(row[cols.qty]) : 0;
    const pru     = cols.pru >= 0 ? parseNum(row[cols.pru]) : 0;
    const montant = cols.montant >= 0 ? parseNum(row[cols.montant]) : (qty * pru);

    if (!nom || (!qty && !montant)) continue;
    if (nom.toLowerCase().includes('total') || nom.toLowerCase().includes('sous-total')) continue;

    positions.push({ nom, isin, quantite: qty, pru, montant });
  }

  return positions;
}

function extractPositionsFallback(rows) {
  // Fallback : chercher lignes avec ISIN (12 chars commençant par 2 lettres)
  const positions = [];
  const isinRe = /^[A-Z]{2}[A-Z0-9]{10}$/;
  rows.forEach(row => {
    const rowStr = row.map(c => String(c||''));
    const isinIdx = rowStr.findIndex(c => isinRe.test(c.trim()));
    if (isinIdx >= 0) {
      const isin = rowStr[isinIdx].trim();
      const nom  = rowStr.find((c,i) => i < isinIdx && c.length > 3 && !/^\d/.test(c)) || '';
      const nums = rowStr.filter(c => parseNum(c) > 0).map(parseNum);
      positions.push({
        nom: nom.trim(), isin, quantite: nums[0]||0,
        pru: nums[1]||0, montant: nums[nums.length-1]||0,
      });
    }
  });
  return positions;
}

function parseNum(v) {
  if (v == null) return 0;
  return parseFloat(String(v).replace(/\s/g,'').replace(',','.')) || 0;
}

function renderCSVPreview(env, positions, filename) {
  const total = positions.reduce((s,p) => s + p.montant, 0);
  const envLabel = env.toUpperCase();

  let rows = positions.map(p => `
    <tr>
      <td>${p.nom}</td>
      <td>${p.isin||'—'}</td>
      <td>${p.quantite}</td>
      <td>${p.pru > 0 ? p.pru.toFixed(2)+' €' : '—'}</td>
      <td>${p.montant.toFixed(2)} €</td>
    </tr>`).join('');

  rows += `<tr class="csv-total">
    <td colspan="4">Total ${envLabel}</td>
    <td>${total.toFixed(2)} €</td>
  </tr>`;

  document.getElementById('preview-'+env).innerHTML = `
    <div class="csv-badge">✅ ${filename} — ${positions.length} lignes</div>
    <table class="csv-table">
      <thead><tr>
        <th>Titre</th><th>ISIN</th><th>Qté</th><th>PRU</th><th>Valeur</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ══════════════════════════════════════════════════════════════════
// ÉTAPE 2 — Cash
// ══════════════════════════════════════════════════════════════════
function renderStepCash() {
  return `
    <div class="card">
      <div class="card-title">💵 Espèces disponibles</div>
      <div class="helper">Saisir le solde espèces de chaque compte (hors titres)</div>
      <div class="fi-row">
        <div class="fi-group">
          <label class="fi-label">Espèces PEA (€)</label>
          <input class="fi-input" id="cash-pea" type="number" step="0.01" placeholder="0"
            value="${MAJ.cash_pea||''}" oninput="MAJ.cash_pea=parseFloat(this.value)||0;updateCashTotal()">
        </div>
        <div class="fi-group">
          <label class="fi-label">Espèces CTO (€)</label>
          <input class="fi-input" id="cash-cto" type="number" step="0.01" placeholder="0"
            value="${MAJ.cash_cto||''}" oninput="MAJ.cash_cto=parseFloat(this.value)||0;updateCashTotal()">
        </div>
      </div>
      <div class="fi-row">
        <div class="fi-group">
          <label class="fi-label">Espèces PEA-PME (€)</label>
          <input class="fi-input" id="cash-pme" type="number" step="0.01" placeholder="0"
            value="${MAJ.cash_pme||''}" oninput="MAJ.cash_pme=parseFloat(this.value)||0;updateCashTotal()">
        </div>
        <div class="fi-group">
          <label class="fi-label">Total espèces</label>
          <input class="fi-input" id="cash-total" readonly value="0">
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-p" onclick="prev()">← Retour</button>
      <button class="btn btn-n" onclick="next()">Suivant →</button>
    </div>
  `;
}

function updateCashTotal() {
  const t = (MAJ.cash_pea||0)+(MAJ.cash_cto||0)+(MAJ.cash_pme||0);
  const el = document.getElementById('cash-total');
  if (el) el.value = t.toFixed(2)+' €';
}

// ══════════════════════════════════════════════════════════════════
// ÉTAPE 3 — AV
// ══════════════════════════════════════════════════════════════════
const AV_FONDS = [
  'Fonds en euros',
  'Echiquier Agenor Mid Cap Europ',
  'Pictet Global Megatrend',
  'DWS Concept Kaldemorgen',
  'DWS Top Dividende',
  'Eurose',
  'ANDERA Dette Privée',
];

function renderStepAV() {
  if (MAJ.av.length === 0) {
    MAJ.av = AV_FONDS.map(nom => ({ nom, valeur: 0 }));
  }

  const rows = MAJ.av.map((f,i) => `
    <tr>
      <td class="saisie-nom">${f.nom}</td>
      <td><input class="saisie-input" type="number" step="0.01" placeholder="0"
        value="${f.valeur||''}" oninput="MAJ.av[${i}].valeur=parseFloat(this.value)||0;updateAVTotal()"></td>
    </tr>`).join('');

// ══════════════════════════════════════════════════════════════════
// CALCUL DES TOTAUX
// ══════════════════════════════════════════════════════════════════
function computeTotals() {
  const pea_pos   = MAJ.pea_positions.reduce((s,p)=>s+p.montant,0);
  const cto_pos   = MAJ.cto_positions.reduce((s,p)=>s+p.montant,0);
  const pme_pos   = MAJ.pme_positions.reduce((s,p)=>s+p.montant,0);
  const pea       = pea_pos + (MAJ.cash_pea||0);
  const cto       = cto_pos + (MAJ.cash_cto||0);
  const pme       = pme_pos + (MAJ.cash_pme||0);
  const av        = MAJ.av.reduce((s,f)=>s+(f.valeur||0),0);
  const pee       = MAJ.pee.reduce((s,f)=>s+(f.valeur||0),0);
  const livrets   = (MAJ.livret_a||0)+(MAJ.livret_usd||0)+(MAJ.livret_eur||0)+(MAJ.cc||0);
  const scpi      = MAJ.scpi||0;
  const revolut   = MAJ.revolut||0;
  const total     = pea+cto+pme+av+pee+livrets+scpi+revolut;

  return {
    pea, cto, pme, av, pee, livrets, scpi, revolut, total,
    pea_positions: MAJ.pea_positions.length,
    cto_positions: MAJ.cto_positions.length,
    pme_positions: MAJ.pme_positions.length,
  };
}

// ══════════════════════════════════════════════════════════════════
// SAUVEGARDE
// ══════════════════════════════════════════════════════════════════
async function sauvegarder() {
  const token = sessionStorage.getItem('hermes_gh_token');
  if (!token) { alert('Token GitHub requis'); return; }

  const status = document.getElementById('save-status');
  status.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding:10px 0">⏳ Sauvegarde en cours...</div>';

  try {
    const state = buildNewState();
    const ok    = await pushToGithub(token, state);

    if (ok) {
      document.getElementById('step-content').innerHTML = `
        <div class="card success-card">
          <div class="success-icon">✅</div>
          <div class="success-title">Mise à jour sauvegardée</div>
          <div class="success-total">${state.snapshots_patrimoine.slice(-1)[0].total.toFixed(0)} €</div>
          <div class="success-sub">Snapshot du ${new Date().toLocaleDateString('fr-FR')} enregistré</div>
        </div>`;
    } else {
      status.innerHTML = '<div style="color:var(--red);font-family:var(--mono);font-size:11px;padding:10px 0">❌ Erreur sauvegarde — vérifier le token et les permissions</div>';
    }
  } catch(e) {
    status.innerHTML = `<div style="color:var(--red);font-family:var(--mono);font-size:11px;padding:10px 0">❌ ${e.message}</div>`;
  }
}

function buildNewState() {
  const existing = STATE_DATA || {};
  const totals   = computeTotals();
  const today    = new Date().toISOString().split('T')[0];
  const positions= existing.positions || {};
  const config   = {};

  // Mettre à jour les positions depuis CSV
  const updatePositions = (csvPositions, enveloppe) => {
    // Marquer comme EXITED les positions absentes du nouveau CSV
    Object.entries(positions).forEach(([ticker, pos]) => {
      if (pos.etat === 'EXITED') return;
      // Trouver l'enveloppe de cette position dans le state existant
      // (on ne touche pas aux positions d'autres enveloppes)
    });

    // Mettre à jour / créer les positions présentes dans le CSV
    csvPositions.forEach(p => {
      // Chercher par ISIN
      let ticker = Object.keys(positions).find(k => positions[k].isin === p.isin);
      if (!ticker) {
        // Créer un nouveau ticker depuis le nom
        ticker = p.nom.toUpperCase().replace(/[^A-Z0-9]/g,'_').substring(0,15);
        positions[ticker] = {
          isin: p.isin, etat: 'FULL',
          alert_sent_at: null, zones_a_definir: true,
          indicateurs_recents: {rsi:[],macd_hist:[]},
          historique_signaux: [], historique_transactions: [],
        };
      }
      positions[ticker].quantite_detenue    = p.quantite;
      positions[ticker].prix_moyen_entree   = p.pru;
      positions[ticker].derniere_valorisation = p.montant;
      positions[ticker].derniere_maj_csv    = today;
      if (!positions[ticker].etat || positions[ticker].etat === 'WATCHLIST') {
        positions[ticker].etat = 'FULL';
      }
    });
  };

  updatePositions(MAJ.pea_positions, 'PEA');
  updatePositions(MAJ.cto_positions, 'CTO');
  updatePositions(MAJ.pme_positions, 'PEA-PME');

  // Construire le snapshot
  const snapshot = {
    date:    today,
    total:   totals.total,
    pea:     totals.pea,
    cto:     totals.cto,
    pme:     totals.pme,
    av:      totals.av,
    pee:     totals.pee,
    livrets: totals.livrets,
    scpi:    totals.scpi,
    revolut: totals.revolut,
    cash_pea: MAJ.cash_pea||0,
    cash_cto: MAJ.cash_cto||0,
    cash_pme: MAJ.cash_pme||0,
    // Détails pour drill-down (Produit 1)
    av_detail:      MAJ.av.filter(f=>f.valeur>0),
    pee_detail:     MAJ.pee.filter(f=>f.valeur>0),
    livrets_detail: [
      {nom:'Livret A',  valeur:MAJ.livret_a||0},
      {nom:'Livret $',  valeur:MAJ.livret_usd||0},
      {nom:'Livret euro',valeur:MAJ.livret_eur||0},
      {nom:'Compte courant',valeur:MAJ.cc||0},
    ].filter(l=>l.valeur>0),
    scpi_detail:    [{nom:'SCPI Corum Origin',valeur:totals.scpi}].filter(l=>l.valeur>0),
    revolut_detail: [{nom:'Revolut ETF Clean Energy',valeur:totals.revolut}].filter(l=>l.valeur>0),
  };

  // Conserver l'historique et ajouter/remplacer le snapshot du jour
  const snaps = existing.snapshots_patrimoine || [];
  const idx   = snaps.findIndex(s => s.date === today);
  if (idx >= 0) snaps[idx] = snapshot;
  else snaps.push(snapshot);

  return {
    ...existing,
    meta: {
      ...(existing.meta||{}),
      derniere_maj_manuelle: today,
      last_maj_by: 'wizard_v2',
    },
    cash: { pea: MAJ.cash_pea||0, cto: MAJ.cash_cto||0, pme: MAJ.cash_pme||0 },
    positions,
    snapshots_patrimoine: snaps,
  };
}

async function pushToGithub(token, data) {
  const url = `https://api.github.com/repos/${GITHUB_USER}/${DATA_REPO}/contents/portfolio_state.json`;
  // Récupérer SHA actuel
  let sha = null;
  try {
    const gr = await fetch(url, { headers: { Authorization: `token ${token}` } });
    if (gr.ok) { const j = await gr.json(); sha = j.sha; }
  } catch(e) {}

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = {
    message: `📊 MAJ manuelle ${new Date().toLocaleDateString('fr-FR')}`,
    content,
  };
  if (sha) body.sha = sha;

  const r = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.ok;
}
