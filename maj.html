<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta charset="UTF-8">
<title>Mise à jour</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#06090f;--bg2:#0b0f18;--bg3:#111722;--bg4:#1a2133;
  --border:#1e2a3d;--border2:#2a3a52;
  --text:#e8eef7;--text2:#7a8fa8;--text3:#3d5068;
  --green:#00d68f;--green2:rgba(0,214,143,.1);
  --red:#ff4d6a;--red2:rgba(255,77,106,.1);
  --blue:#4d9fff;--blue2:rgba(77,159,255,.1);
  --gold:#f0b429;--gold2:rgba(240,180,41,.1);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;overflow-y:auto}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.page{max-width:920px;margin:0 auto;padding:28px 28px 80px}
.page-title{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.page-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:28px;letter-spacing:1px}

/* STEPS */
.steps{display:flex;margin-bottom:28px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.step-btn{flex:1;padding:10px 8px;text-align:center;font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--text3);background:var(--bg2);border-right:1px solid var(--border)}
.step-btn:last-child{border-right:none}
.step-btn.active{background:var(--blue2);color:var(--blue)}
.step-btn.done{background:var(--green2);color:var(--green)}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:14px}
.card-title{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.badge{font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:3px}
.badge-blue{background:var(--blue2);color:var(--blue)}
.badge-gold{background:var(--gold2);color:var(--gold)}

/* DROPZONE */
.dz{border:2px dashed var(--border2);border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:10px}
.dz:hover,.dz.drag{border-color:var(--blue);background:var(--blue2)}
.dz-icon{font-size:24px;margin-bottom:6px}
.dz-label{font-family:var(--mono);font-size:10px;color:var(--text3)}
.dz-label strong{color:var(--text2)}
input[type=file]{display:none}

/* CSV TABLE */
.csv-ok{display:inline-flex;align-items:center;gap:6px;background:var(--green2);border:1px solid rgba(0,214,143,.3);border-radius:4px;padding:4px 10px;font-family:var(--mono);font-size:10px;color:var(--green);margin-bottom:8px}
.csv-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px}
.csv-tbl th{background:var(--bg3);font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;padding:7px 10px;border-bottom:1px solid var(--border);text-align:right}
.csv-tbl th:first-child{text-align:left}
.csv-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;text-align:right}
.csv-tbl td:first-child{text-align:left}
.csv-tbl tr:last-child td{border-bottom:none}
.trow-total{background:var(--bg3);font-weight:700;color:var(--gold)}

/* INPUTS */
.fi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fi-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.fi{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--blue)}
.fi[readonly]{color:var(--text2)}

/* SAISIE TABLE */
.st{width:100%;border-collapse:collapse;margin-bottom:8px}
.st th{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;padding:8px 10px;background:var(--bg3);border-bottom:1px solid var(--border);text-align:left}
.st th:last-child{text-align:right;width:180px}
.st td{padding:5px 10px;border-bottom:1px solid var(--border);font-size:12px}
.st td:last-child{text-align:right}
.st tr:last-child td{border-bottom:none}
.si{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:3px 4px;width:100%;outline:none;text-align:right}
.si:focus{border-color:var(--blue)}
.tr-tot{background:var(--bg3);font-weight:700;font-family:var(--mono);color:var(--gold)}

/* TOTAUX */
.tot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.tot-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px}
.tot-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.tot-val{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--gold)}
.tot-val.big{font-size:22px}

/* BOUTONS */
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{padding:10px 20px;border-radius:6px;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-back{background:var(--border2);color:var(--text2)}
.btn-next{background:var(--blue);color:#fff;flex:1}
.btn-save{background:var(--green);color:var(--bg);flex:1;font-weight:700;font-size:14px}
.btn-add{padding:6px 12px;font-size:11px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:4px;cursor:pointer;margin-top:6px}
.btn-del{background:var(--red2);border:1px solid var(--red);color:var(--red);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px;flex-shrink:0}

/* TOKEN */
.token-info{background:var(--blue2);border:1px solid rgba(77,159,255,.2);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--blue);margin-bottom:14px;line-height:1.8}

/* SUCCESS */
.success{text-align:center;padding:48px 20px}
.success-icon{font-size:52px;margin-bottom:16px}
.success-ttl{font-size:16px;font-weight:600;margin-bottom:8px}
.success-tot{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--gold);margin:12px 0}
.success-sub{font-family:var(--mono);font-size:11px;color:var(--green);line-height:1.8}

.helper{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:12px;line-height:1.7}
.divider{height:1px;background:var(--border);margin:16px 0}




.mobile-nav-item.active{color:var(--green)}



/* ═══ RESPONSIVE MOBILE — FIXES ═══ */
@media (max-width: 768px) {
  /* Padding bottom pour ne pas masquer le contenu sous la nav externe */
  body { padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px)) !important; }
  .page { padding: 12px 14px calc(56px + 20px) !important; }

  /* P5 — tableaux : pas de min-width, scroll horizontal */
  table { min-width: unset !important; width: 100%; }
  .tbl-wrap, .st, .csv-tbl { overflow-x: auto; display: block; -webkit-overflow-scrolling: touch; }

  /* P5 — recap grid 1 colonne */
  .recap-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .tot-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .tot-card { padding: 10px; }
  .tot-lbl { font-size: 8px; }
  .tot-val { font-size: 14px; }

  /* P5 — formulaires grilles */
  .fg-grid { grid-template-columns: 1fr 1fr; gap: 8px; }

  /* P5 — SCPI & Revolut alignés */
  .field-group { flex-direction: column; gap: 8px; }

  /* P2 — zones alignées sur mobile */
  .zone-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
  .zone-inp { width: 100%; }

  /* P5 tableau récap : valeurs pas tronquées */
  .st td, .st th { white-space: nowrap; font-size: 11px; padding: 6px 8px; }
  .st td:last-child { text-align: right; }

  /* Wizard steps scrollable */
  .wizard-steps { white-space: nowrap; overflow-x: auto; }
  .step-item { display: inline-flex; min-width: 55px; }

  /* Livrets — labels courts, inputs alignés */
  .fg { display: flex; flex-direction: column; }
  .fg label { min-height: 28px; display: flex; align-items: flex-start; font-size: 8px; }
  .fi { width: 100%; }
  .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
}

</style>
</head>
<body>
<div class="page">
  <div class="page-title">↑ Mise à jour</div>
  <div class="page-sub">ACTUALISATION MANUELLE DU PATRIMOINE</div>
  <div class="steps" id="steps-bar"></div>
  <div id="step-content"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG — 4 fichiers JSON
// ══════════════════════════════════════════════════════════════════
const GH_USER  = 'Cookiem420';
const GH_REPO  = 'hermes-data';
const GH_API   = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/`;
const RAW_BASE = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/`;

const FILES = {
  tampon:   'maj_tampon.json',
  maj:      'maj.json',
  moins1:   'maj_moins1.json',
  graph:    'maj_graph.json',
  table:    'table_infos_valeurs.json',
};

const STEPS = [
  {id:'csv',    label:'CSV + Cash'},
  {id:'av',     label:'Ass. Vie'},
  {id:'pee',    label:'PEE'},
  {id:'autres', label:'Livrets & +'},
  {id:'recap',  label:'Récap'},
  {id:'token',  label:'Sauvegarde'},
];

let step = 0;

const D = {
  pea:[], cto:[], pme:[],
  cash_pea:0, cash_cto:0, cash_pme:0,
  av:[], pee:[],
  livret_a:0, livret_usd:0, livret_eur:0,
  scpi:0, revolut:0, cc:0,
};

// Données existantes
let MAJ_GRAPH = null;
let TABLE_INFOS = null;

const AV_FONDS = [
  'Fonds en euros','Echiquier Agenor Mid Cap Europ','Pictet Global Megatrend',
  'DWS Concept Kaldemorgen','DWS Top Dividende','Eurose','ANDERA Dette Privée',
];
const PEE_FONDS = [
  'HSBC EE EURO PME F','HSBC EE ACTIONS EUROPE SOLUTIONS CLIMAT F',
  'HSBC EE ISR ACTIONS EURO F','HSBC EE ISR DIVERSIFIE ET SOLIDAIRE G',
  'HSBC EE ISR ACTIONS MONDE F',
];

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
async function init() {
  if(D.av.length===0)  D.av  = AV_FONDS.map(n=>({nom:n,valeur:0}));
  if(D.pee.length===0) D.pee = PEE_FONDS.map(n=>({nom:n,valeur:0}));
  try {
    const [gr, tr] = await Promise.all([
      fetch(RAW_BASE+FILES.graph+'?t='+Date.now()),
      fetch(RAW_BASE+'table_infos_valeurs.json?t='+Date.now()),
    ]);
    if(gr.ok) MAJ_GRAPH    = await gr.json();
    if(tr.ok) TABLE_INFOS  = await tr.json();
  } catch(e) { console.warn('init load error:', e); }
  renderStep();
}

// ══════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════
function renderStepsBar() {
  document.getElementById('steps-bar').innerHTML = STEPS.map((s,i)=>`
    <div class="step-btn ${i===step?'active':i<step?'done':''}">
      ${i<step?'✓ ':''}${s.label}
    </div>`).join('');
}

function renderStep() {
  renderStepsBar();
  const renders={csv:rCSV,av:rAV,pee:rPEE,autres:rAutres,recap:rRecap,token:rToken};
  document.getElementById('step-content').innerHTML = renders[STEPS[step].id]();
  afterRender(STEPS[step].id);
}

function goNext(){if(step<STEPS.length-1){step++;renderStep();}}
function goBack(){if(step>0){step--;renderStep();}}

function afterRender(id){
  if(id==='av')     setTimeout(updAV,50);
  if(id==='pee')    setTimeout(updPEE,50);
  if(id==='autres') setTimeout(updAutres,50);
}

// ══════════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════════
function fmt(n,d=0){if(!n&&n!==0)return'—';return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)}
function parseNum(v){
  if(v==null||v==='') return 0;
  // Si déjà un number (XLSX raw:true), retourner directement
  if(typeof v === 'number') return isNaN(v) ? 0 : v;
  // Gérer formats string Boursorama : 1 234,56 / 1.234,56 / 1234.56 / 1 234.56
  let s = String(v).replace(/\u00a0/g,' ').trim();
  if(!s) return 0;
  // Détecter le format : si virgule présente → c'est le séparateur décimal (format FR)
  if(s.includes(',')) {
    // Format FR : supprimer les points/espaces de milliers, remplacer virgule par point
    s = s.replace(/[.\s]/g,'').replace(',','.');
  } else {
    // Format EN ou nombre entier : supprimer espaces uniquement
    s = s.replace(/\s/g,'');
  }
  return parseFloat(s) || 0;
}
function todayStr(){return new Date().toISOString().split('T')[0]}

// ══════════════════════════════════════════════════════════════════
// ÉTAPE 1 — CSV + Cash
// ══════════════════════════════════════════════════════════════════
function rCSV() {
  const mkDZ = (env,label) => `
    <div class="card">
      <div class="card-title">${label} <span class="badge badge-blue">${env.toUpperCase()}</span></div>
      <div class="helper">Export Boursorama → Mon compte → Télécharger → CSV ou Excel</div>
      <div class="dz" id="dz-${env}"
        onclick="document.getElementById('fi-${env}').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="event.preventDefault();this.classList.remove('drag');dropFile(event,'${env}')">
        <div class="dz-icon">📄</div>
        <div class="dz-label"><strong>Glisser CSV/XLSX ${env.toUpperCase()}</strong> ou cliquer</div>
      </div>
      <input type="file" id="fi-${env}" accept=".csv,.xlsx,.xls" onchange="pickFile(this,'${env}')">
      <div id="prev-${env}"></div>
    </div>`;

  return `
    ${mkDZ('pea','📂 Import Boursorama')}
    ${mkDZ('cto','📂 Import Boursorama')}
    ${mkDZ('pme','📂 Import Boursorama')}
    <div class="card">
      <div class="card-title">💵 Espèces disponibles <span class="badge badge-blue">inclus dans les totaux</span></div>
      <div class="helper">Solde espèces de chaque poche — visible séparément dans le tableau de bord</div>
      <div class="fi-grid-3">
        <div class="fg"><label class="fl">Espèces PEA (€)</label>
          <input class="fi" id="cash-pea" type="number" step="0.01" placeholder="0.00"
            value="${D.cash_pea||''}" oninput="D.cash_pea=parseFloat(this.value)||0"></div>
        <div class="fg"><label class="fl">Espèces CTO (€)</label>
          <input class="fi" id="cash-cto" type="number" step="0.01" placeholder="0.00"
            value="${D.cash_cto||''}" oninput="D.cash_cto=parseFloat(this.value)||0"></div>
        <div class="fg"><label class="fl">Espèces PEA-PME (€)</label>
          <input class="fi" id="cash-pme" type="number" step="0.01" placeholder="0.00"
            value="${D.cash_pme||''}" oninput="D.cash_pme=parseFloat(this.value)||0"></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-next" onclick="goNext()">Suivant →</button></div>`;
}

// ── Parsing CSV/XLSX ───────────────────────────────────────────────
function dropFile(e,env){const f=e.dataTransfer.files[0];if(f)processFile(f,env);}
function pickFile(inp,env){if(inp.files[0])processFile(inp.files[0],env);}

function processFile(file,env){
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let rows;
      if(ext==='csv'){
        rows=parseCSVText(e.target.result);
      } else {
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
      }
      const positions=parsePositions(rows,env);
      D[env]=positions;
      showPreview(env,positions,file.name);
    } catch(err){
      document.getElementById('prev-'+env).innerHTML=
        `<div style="color:var(--red);font-family:var(--mono);font-size:10px;padding:8px">Erreur : ${err.message}</div>`;
      console.error(err);
    }
  };
  if(ext==='csv') reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

function parseCSVText(text){
  const lines=text.split('\n');
  const sep=lines[0].includes(';')?';':',';
  return lines.map(l=>l.split(sep).map(c=>c.trim().replace(/^"|"$/g,'')));
}

function parsePositions(rows,env){
  const positions=[];
  let headerIdx=-1;
  let cols={nom:-1,isin:-1,qty:-1,pru:-1,cours:-1,montant:-1};

  // Détecter header Boursorama : name;isin;quantity;buyingPrice;lastPrice;...;amount;...
  for(let i=0;i<Math.min(rows.length,10);i++){
    const row=rows[i].map(c=>String(c||'').replace(/^\uFEFF/,'').toLowerCase().replace(/[^a-z]/g,''));
    if(row.includes('name')||row.includes('isin')||row.includes('buyingprice')){
      headerIdx=i;
      row.forEach((cell,j)=>{
        if(cell==='name'||cell.includes('libel')||cell.includes('titre')) cols.nom=j;
        else if(cell==='isin') cols.isin=j;
        else if(cell==='quantity'||cell.includes('quantit')) cols.qty=j;
        else if(cell==='buyingprice'||cell==='pru'||cell.includes('prixmoyen')||cell.includes('prixrev')) cols.pru=j;
        else if(cell==='lastprice') cols.cours=j;
        else if((cell==='amount'||cell==='montant'||cell.includes('valoris'))&&!cell.includes('variation')&&!cell.includes('ecart')) cols.montant=j;
      });
      console.log('['+env+'] header r'+i+' cols:',JSON.stringify(cols));
      break;
    }
  }

  // Fallback score
  if(headerIdx===-1){
    const kws=['name','isin','quantity','buyingprice','lastprice','amount'];
    for(let i=0;i<Math.min(rows.length,15);i++){
      const row=rows[i].map(c=>String(c||'').toLowerCase().replace(/[^a-z]/g,''));
      if(row.filter(c=>kws.some(k=>c.includes(k))).length>=3){
        headerIdx=i;
        row.forEach((cell,j)=>{
          if(cell.includes('name')||cell.includes('libel')) cols.nom=j;
          if(cell==='isin') cols.isin=j;
          if(cell.includes('quantit')) cols.qty=j;
          if(cell.includes('buyingprice')||cell==='pru') cols.pru=j;
          if(cell.includes('lastprice')) cols.cours=j;
          if(cell==='amount'||cell.includes('valoris')) cols.montant=j;
        });
        console.log('['+env+'] fallback header r'+i);
        break;
      }
    }
  }

  if(headerIdx>=0){
    for(let i=headerIdx+1;i<rows.length;i++){
      const row=rows[i];
      if(!row||row.length<2) continue;
      if(row.every(c=>!String(c||'').trim())) continue;
      const cl=c=>String(c||'').trim().replace(/^"|"$/g,'');
      const nom    =cols.nom>=0    ?cl(row[cols.nom]):'';
      const isin   =cols.isin>=0   ?cl(row[cols.isin]).replace(/\s/g,''):'';
      const qty    =cols.qty>=0    ?parseNum(row[cols.qty]):0;
      const pru    =cols.pru>=0    ?parseNum(row[cols.pru]):0;
      const cours  =cols.cours>=0  ?parseNum(row[cols.cours]):0;
      let montant  =cols.montant>=0?parseNum(row[cols.montant]):0;
      if(!montant&&qty>0&&cours>0) montant=qty*cours;
      if(!montant&&qty>0&&pru>0)   montant=qty*pru;
      if(!nom||/^(total|sous.total|solde)$/i.test(nom.trim())) continue;
      if(qty<=0&&montant<=0) continue;
      positions.push({nom,isin,quantite:qty,pru,montant});
    }
  } else {
    console.warn('['+env+'] header non détecté — fallback ISIN');
    const isinRe=/^[A-Z]{2}[A-Z0-9]{10}$/;
    rows.forEach(row=>{
      const strs=row.map(c=>String(c||'').trim().replace(/^"|"$/g,''));
      const ii=strs.findIndex(c=>isinRe.test(c));
      if(ii>=0){
        const isin=strs[ii];
        const nom=strs.find((c,i)=>i<ii&&c.length>2&&!/^[\d,.]/.test(c))||isin;
        const nums=strs.map(parseNum).filter(n=>n>0);
        positions.push({nom,isin,quantite:nums[0]||0,pru:nums[1]||0,montant:nums[nums.length-1]||0});
      }
    });
  }
  console.log('['+env+']',positions.length,'positions');
  return positions;
}

// CALCUL TOTAUX
// ══════════════════════════════════════════════════════════════════
function computeTotaux(){
  const pea_pos=D.pea.reduce((s,p)=>s+p.montant,0);
  const cto_pos=D.cto.reduce((s,p)=>s+p.montant,0);
  const pme_pos=D.pme.reduce((s,p)=>s+p.montant,0);
  const pea    =pea_pos+(D.cash_pea||0);
  const cto    =cto_pos+(D.cash_cto||0);
  const pme    =pme_pos+(D.cash_pme||0);
  const av     =D.av.reduce((s,f)=>s+(f.valeur||0),0);
  const pee    =D.pee.reduce((s,f)=>s+(f.valeur||0),0);
  const livrets=(D.livret_a||0)+(D.livret_usd||0)+(D.livret_eur||0)+(D.cc||0);
  const scpi   =D.scpi||0;
  const revolut=D.revolut||0;
  const total  =pea+cto+pme+av+pee+livrets+scpi+revolut;
  return {pea,cto,pme,av,pee,livrets,scpi,revolut,total,
          pea_pos,cto_pos,pme_pos,
          cash_pea:D.cash_pea,cash_cto:D.cash_cto,cash_pme:D.cash_pme};
}

// ══════════════════════════════════════════════════════════════════
// SAUVEGARDE — Logique 4 fichiers
// ══════════════════════════════════════════════════════════════════
async function save(){
  const token=sessionStorage.getItem('hermes_gh_token')||'';
  if(!token){alert('Token GitHub requis');return;}

  const msg=(text,color='var(--text3)')=>{
    document.getElementById('save-msg').innerHTML=
      `<div style="font-family:var(--mono);font-size:11px;color:${color};padding:10px 0">${text}</div>`;
  };

  msg('⏳ Préparation des données...');

  try {
    const t    = computeTotaux();
    const date = todayStr();

    // ── Enrichir pme_positions avec intérêts Crowdfunding ──────────
    const pmeEnriched = D.pme.map(p => {
      const isinKey = (p.isin||'').trim().toUpperCase();
      const e = TABLE_INFOS?.valeurs?.[isinKey];
      if(e?.categorie==='Crowdfunding' && e?.taux_interet && e?.date_debut && e?.montant_investi) {
        const jours = Math.floor((Date.now() - new Date(e.date_debut).getTime()) / 86400000);
        const interets = Math.round(e.montant_investi * e.taux_interet * jours / 365 * 100) / 100;
        return {...p, montant: e.montant_investi + interets};
      }
      return p;
    });

    // ── Construire le tampon (nouvelles données) ───────────────────
    const tampon = {
      meta: {date_maj:date, version:'2.0'},
      cash: {pea:D.cash_pea||0, cto:D.cash_cto||0, pme:D.cash_pme||0},
      pea_positions: D.pea,
      cto_positions: D.cto,
      pme_positions: pmeEnriched,
      av:  D.av.filter(f=>f.valeur>0),
      pee: D.pee.filter(f=>f.valeur>0),
      livrets: [
        {nom:'Livret A',    valeur:D.livret_a||0},
        {nom:'Livret $',    valeur:D.livret_usd||0},
        {nom:'Livret euro', valeur:D.livret_eur||0},
        {nom:'Compte courant',valeur:D.cc||0},
      ].filter(l=>l.valeur>0),
      scpi:    D.scpi||0,
      revolut: D.revolut||0,
      totaux: (()=>{
        // Recalculer pme avec intérêts Crowdfunding inclus
        const pmeTotEnriched = pmeEnriched.reduce((s,p)=>s+(p.montant||0),0)+(D.cash_pme||0);
        const totalEnriched = pmeTotEnriched + t.pea + t.cto + t.av + t.pee + t.livrets + t.scpi + t.revolut;
        return {pea:t.pea,cto:t.cto,pme:pmeTotEnriched,av:t.av,pee:t.pee,
               livrets:t.livrets,scpi:t.scpi,revolut:t.revolut,total:totalEnriched};
      })(),
    };

    // ── Lire MAJ courante (pour l'écraser dans MAJ-1) ─────────────
    msg('⏳ Lecture MAJ courante...');
    let majCourante = null;
    try {
      const r = await fetch(RAW_BASE+FILES.maj+'?t='+Date.now());
      if(r.ok) majCourante = await r.json();
    } catch(e) {}

    // ── Lire graph existant ────────────────────────────────────────
    msg('⏳ Lecture historique...');
    const graph = MAJ_GRAPH || {snapshots:[]};

    // ── Snapshot pour le graph — toujours ajouter même date différente
    const snap = {date, totaux: tampon.totaux};
    const snapIdx = graph.snapshots.findIndex(s=>s.date===date);
    if(snapIdx>=0) graph.snapshots[snapIdx]=snap;
    else graph.snapshots.push(snap);
    // Vrai indicateur de delta dispo : MAJ courante avait une date (= rotation réelle)
    const hasPrevMAJ = !!(majCourante && majCourante.meta?.date_maj);

    // ══════════════════════════════════════════════════════════════
    // SÉQUENCE DE SAUVEGARDE (ordre important)
    // 1. tampon → contient les nouvelles données
    // 2. MAJ-1  ← écrasée par MAJ courante
    // 3. MAJ    ← écrasée par tampon
    // 4. graph  ← snapshot ajouté
    // ══════════════════════════════════════════════════════════════

    msg('⏳ [1/4] Sauvegarde tampon...');
    const ok1 = await ghPut(token, FILES.tampon, tampon, `📦 Tampon MAJ ${date}`);
    if(!ok1) throw new Error('Échec écriture tampon');

    msg('⏳ [2/4] Rotation MAJ → MAJ-1...');
    // Toujours écrire MAJ-1 avec le contenu actuel de maj.json
    // (même si vide lors de la 1ère MAJ — c'est intentionnel)
    const ok2 = await ghPut(token, FILES.moins1, majCourante || tampon,
      `📦 MAJ-1 ← MAJ ${majCourante?.meta?.date_maj || date}`);
    if(!ok2) throw new Error('Échec écriture MAJ-1');

    msg('⏳ [3/4] Mise à jour MAJ...');
    const ok3 = await ghPut(token, FILES.maj, tampon, `📊 MAJ ${date} — ${fmt(t.total)} €`);
    if(!ok3) throw new Error('Échec écriture MAJ');

    msg('⏳ [4/4] Mise à jour graph...');
    const ok4 = await ghPut(token, FILES.graph, graph, `📈 Graph MAJ ${date}`);
    if(!ok4) throw new Error('Échec écriture graph');

    // ── Réconciliation table_infos_valeurs ──────────────────────
    // Comparer positions CSV avec la table pour détecter nouveautés/changements qté
    const alertes = [];
    const allCSVPos = [...tampon.pea_positions, ...tampon.cto_positions, ...tampon.pme_positions];
    if(TABLE_INFOS?.valeurs) {
      const tableV = TABLE_INFOS.valeurs;
      let tableChanged = false;

      allCSVPos.forEach(p => {
        const key = p.isin || p.nom;
        const existing = tableV[key];
        if(!existing) {
          // Nouvelle position — l'ajouter à la table avec alerte zones manquantes
          tableV[key] = {
            isin: p.isin, nom: p.nom, quantite: p.quantite,
            cours: 0,
            zones: {basse_min:0,basse_max:0,surveillance:0,complement:0,breakout:0},
            risque: null, categorie: null, thematique: null, enveloppe: 'À définir',
            ancien_etat: null, etat_actuel: 'NOUVEAU',
            achat_vente: null, q_achat_vente: 0, prix_achat_vente: 0,
          };
          alertes.push(`🆕 Nouvelle position : ${p.nom} — zones à définir`);
          tableChanged = true;
        } else if(existing.quantite !== p.quantite) {
          // Quantité changée
          const diff = p.quantite - existing.quantite;
          alertes.push(`📊 ${p.nom} : quantité ${existing.quantite} → ${p.quantite} (${diff>0?'+':''}${diff})`);
          existing.quantite = p.quantite;
          tableChanged = true;
        }
      });

      // Positions dans la table avec qté > 0 mais absentes du CSV → passage watchlist
      Object.entries(tableV).forEach(([key, tv]) => {
        if(tv.quantite > 0) {
          const inCSV = allCSVPos.find(p => (p.isin && p.isin === key) || p.nom === tv.nom);
          if(!inCSV) {
            alertes.push(`👁️ ${tv.nom} : absent du CSV → passage watchlist (qté 0)`);
            tv.quantite = 0;
            tv.etat_actuel = 'WATCHLIST';
            tableChanged = true;
          }
        }
      });

      if(tableChanged) {
        TABLE_INFOS.meta = TABLE_INFOS.meta || {};
        TABLE_INFOS.meta.derniere_maj = date;
        await ghPut(token, FILES.table, TABLE_INFOS, `🔄 Réconciliation table ${date}`);
      }
    }

    // Succès
    MAJ_GRAPH = graph;
    document.getElementById('step-content').innerHTML=`
      <div class="card success">
        <div class="success-icon">✅</div>
        <div class="success-ttl">Mise à jour enregistrée</div>
        <div class="success-tot">${fmt(t.total,2)} €</div>
        <div class="success-sub">
          MAJ tampon → MAJ-1 → MAJ → Graph<br>
          ${graph.snapshots.length} point(s) d'historique<br>
          ${hasPrevMAJ?'✅ Delta disponible — rechargez le tableau de bord':'ℹ️ Faites une 2ème MAJ pour voir les écarts de performance'}
          ${alertes.length>0?'<div style="margin-top:12px;text-align:left;background:var(--bg3);border-radius:6px;padding:10px 14px">'+
            alertes.map(a=>`<div style="font-family:var(--mono);font-size:10px;color:var(--gold);padding:2px 0">${a}</div>`).join('')+
          '</div>':''}
        </div>
      </div>`;

  } catch(e){
    msg('❌ '+e.message,'var(--red)');
    console.error(e);
  }
}

// ── GitHub API PUT ────────────────────────────────────────────────
async function ghPut(token,filename,data,message){
  const url=GH_API+filename;
  async function getSha(){
    try{
      const gr=await fetch(url,{headers:{Authorization:`token ${token}`}});
      if(gr.ok){const j=await gr.json();return j.sha;}
    }catch(e){}
    return null;
  }
  const sha=await getSha();
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const body={message,content};
  if(sha) body.sha=sha;
  let r=await fetch(url,{
    method:'PUT',
    headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify(body),
  });
  // Retry sur 409 (SHA périmé entre le GET et le PUT)
  if(r.status===409){
    const sha2=await getSha();
    if(sha2){body.sha=sha2;}
    r=await fetch(url,{
      method:'PUT',
      headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
  }
  if(!r.ok){
    const txt=await r.text().catch(()=>'');
    console.error('PUT failed:',filename,r.status,txt);
  }
  return r.ok;
}
