<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERMÈS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#06090f;--bg2:#0b0f18;--bg3:#111722;
  --border:#1e2a3d;--border2:#2a3a52;
  --text:#e8eef7;--text2:#7a8fa8;--text3:#3d5068;
  --green:#00d68f;--gold:#f0b429;--blue:#4d9fff;--red:#ff4d6a;
  --nav-w:210px;--hdr-h:50px;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;-webkit-font-smoothing:antialiased}

#login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px;width:320px;text-align:center}
.login-logo{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:4px;margin-bottom:6px}
.login-logo span{color:var(--gold)}
.login-sub{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:32px}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;color:var(--text);font-family:var(--mono);font-size:16px;text-align:center;letter-spacing:8px;outline:none;transition:border-color .2s;margin-bottom:12px}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:12px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.85}
.login-err{display:none;margin-top:10px;font-family:var(--mono);font-size:10px;color:var(--red)}

#app{height:100vh;display:none;flex-direction:row}
#app.visible{display:flex}

.sidebar{width:var(--nav-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo-text{font-family:var(--mono);font-size:16px;font-weight:700;letter-spacing:3px}
.sidebar-logo-text span{color:var(--gold)}
.nav-section{padding:16px 0;flex:1}
.nav-label{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:0 20px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:all .12s;border-left:2px solid transparent;color:var(--text2);font-size:13px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(77,159,255,.08);border-left-color:var(--blue);color:var(--text)}
.nav-item .ic{font-size:14px;width:18px;text-align:center}
.nav-sep{height:1px;background:var(--border);margin:8px 20px}
.sidebar-foot{padding:16px 20px;border-top:1px solid var(--border)}
.foot-status{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.foot-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.foot-txt{font-family:var(--mono);font-size:9px;color:var(--text3)}

.content-area{flex:1;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.content-header{height:var(--hdr-h);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;flex-shrink:0}
.content-header-title{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.content-body{flex:1;overflow:hidden;position:relative}
.content-body iframe{width:100%;height:100%;border:none;display:none}
.content-body iframe.active{display:block}
.coming-soon{display:none;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text3);font-family:var(--mono);font-size:11px}
.coming-soon.active{display:flex}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;font-family:var(--mono);font-size:11px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:500}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">HERM<span>È</span>S</div>
    <div class="login-sub">Pilotage patrimonial</div>
    <input class="login-input" id="login-pwd" type="password" placeholder="••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Accéder</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">HERM<span>È</span>S</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Portefeuille</div>
      <div class="nav-item active" data-page="passif" onclick="nav(this)">
        <span class="ic">◈</span> Patrimoine
      </div>
      <div class="nav-item" data-page="actions" onclick="nav(this)">
        <span class="ic">⚡</span> Actions
      </div>
      <div class="nav-item" data-page="watchlist" onclick="nav(this)">
        <span class="ic">◎</span> Watchlist
      </div>
      <div class="nav-item" data-page="historique" onclick="nav(this)">
        <span class="ic">◷</span> Historique
      </div>
      <div class="nav-sep"></div>
      <div class="nav-item" data-page="maj" onclick="nav(this)">
        <span class="ic">↑</span> Mise à jour
      </div>
    </div>
    <div class="sidebar-foot">
      <div class="foot-status"><div class="foot-dot"></div><div class="foot-txt">Hermès actif</div></div>
      <div class="foot-txt" id="foot-date">—</div>
    </div>
  </div>

  <div class="content-area">
    <div class="content-header">
      <div class="content-header-title" id="page-title">Patrimoine</div>
    </div>
    <div class="content-body">
      <iframe id="frame-passif" class="active" src="passif.html"></iframe>
      <iframe id="frame-actions" src="about:blank"></iframe>
      <iframe id="frame-watchlist" src="about:blank"></iframe>
      <iframe id="frame-maj" src="about:blank"></iframe>
      <div id="frame-historique" class="coming-soon">
        <div style="font-size:32px">◷</div><div>Produit 4 — bientôt</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GH_USER = 'Cookiem420';
const GH_REPO_DATA = 'hermes-data';
const RAW_DATA = 'https://raw.githubusercontent.com/' + GH_USER + '/' + GH_REPO_DATA + '/main/';

// Token chargé depuis hermes-data/config.json — jamais hardcodé dans le HTML
let GH_TOKEN = '';

const PAGE_TITLES = {passif:'Patrimoine',actions:'Actions',watchlist:'Watchlist',historique:'Historique',maj:'Mise à jour'};
const PAGE_SRCS = {passif:'passif.html',actions:'actions.html',watchlist:'watchlist.html',maj:'maj.html'};

// Date sidebar
const days=['dim.','lun.','mar.','mer.','jeu.','ven.','sam.'];
const months=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const now=new Date();
document.getElementById('foot-date').textContent=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()];

// Navigation
function nav(el) {
  const page = el.dataset.page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-title').textContent = PAGE_TITLES[page]||page;
  document.querySelectorAll('.content-body iframe, .content-body .coming-soon')
    .forEach(f=>f.classList.remove('active'));
  const frame = document.getElementById('frame-'+page);
  if(!frame) return;
  if(frame.tagName==='IFRAME' && frame.src.endsWith('about:blank') && PAGE_SRCS[page]) {
    frame.src = PAGE_SRCS[page];
    frame.onload = () => {
      if(GH_TOKEN) {
        try { frame.contentWindow.postMessage({type:'HERMES_TOKEN',token:GH_TOKEN},'*'); } catch(e){}
      }
    };
  }
  frame.classList.add('active');
}

// Répondre aux demandes de token des iframes enfants
window.addEventListener('message', e => {
  if(e.data?.type==='HERMES_TOKEN_REQUEST' && GH_TOKEN) {
    e.source?.postMessage({type:'HERMES_TOKEN',token:GH_TOKEN},'*');
  }
});

// LOGIN
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let loginAttempts = 0;
const MAX_ATTEMPTS = 3;

async function doLogin() {
  const blockedUntil = localStorage.getItem('hermes_blocked_until');
  if(blockedUntil && Date.now() < parseInt(blockedUntil)) {
    showErr('Accès bloqué 24h suite à trop de tentatives');return;
  }
  const pwd = document.getElementById('login-pwd').value;
  if(!pwd) return;
  const hash = await sha256(pwd);

  // Charger config depuis hermes-data pour vérifier le hash et récupérer le token
  let config;
  try {
    const r = await fetch(RAW_DATA + 'config.json?t=' + Date.now());
    config = await r.json();
  } catch(e) {
    showErr('Erreur connexion au serveur');return;
  }

  if(hash === config.password_hash) {
    loginAttempts = 0;
    localStorage.removeItem('hermes_blocked_until');
    sessionStorage.setItem('hermes_auth', hash);
    // Stocker le token pour toutes les iframes
    GH_TOKEN = config.tk ? atob(config.tk) : config.gh_token||'';
    sessionStorage.setItem('hermes_gh_token', GH_TOKEN);
    localStorage.setItem('hermes_gh_token', GH_TOKEN);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    // Injecter dans passif déjà chargé
    try {
      document.getElementById('frame-passif').contentWindow
        .postMessage({type:'HERMES_TOKEN',token:GH_TOKEN},'*');
    } catch(e){}
  } else {
    loginAttempts++;
    if(loginAttempts >= MAX_ATTEMPTS) {
      localStorage.setItem('hermes_blocked_until', (Date.now()+24*3600*1000).toString());
      fetch('https://api.telegram.org/bot8675954697:AAHRlyrxA2WwWrLGTEE0Ljq2nkfxLDUj_nw/sendMessage',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:'8818994234',text:'Hermes : 3 tentatives echouees - acces bloque 24h'})
      }).catch(()=>{});
      showErr('Accès bloqué 24h — alerte envoyée');
    } else {
      const r = MAX_ATTEMPTS - loginAttempts;
      showErr('Mot de passe incorrect — '+r+' tentative'+(r>1?'s':'')+' restante'+(r>1?'s':''));
    }
    document.getElementById('login-pwd').value='';
    document.getElementById('login-pwd').focus();
    document.getElementById('login-pwd').style.borderColor='var(--red)';
    setTimeout(()=>document.getElementById('login-pwd').style.borderColor='',1000);
  }
}

function showErr(msg){
  const e=document.getElementById('login-err');e.textContent=msg;e.style.display='block';
}

// Si déjà auth en session
(async()=>{
  const auth = sessionStorage.getItem('hermes_auth');
  const tok = sessionStorage.getItem('hermes_gh_token')||localStorage.getItem('hermes_gh_token');
  if(auth && tok) {
    GH_TOKEN = tok;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    try{document.getElementById('frame-passif').contentWindow.postMessage({type:'HERMES_TOKEN',token:GH_TOKEN},'*');}catch(e){}
  }
})();

function toast(msg,color='var(--green)'){
  const el=document.getElementById('toast');el.textContent=msg;el.style.color=color;
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);
}
</script>
</body>
</html>
